<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>티렉스 런 (초고속 & 렌더링 최적화)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e272e; 
            color: #d2dae2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; 
            overflow: hidden;
            touch-action: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }

        .btn-main-go:hover { background: #27ae60; }
        .btn-main-go:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #27ae60;
        }

        h1 {
            color: #f1c40f;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            font-weight: 900;
        }

        #game-wrapper {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #2c3e50;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 900px; 
            background-color: #f7f7f7;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 💡 점수판 레이아웃 수정 (좌측 시간, 우측 점수) */
        #score-board {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px 5px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #535353;
            letter-spacing: 2px;
        }

        #time-display {
            color: #e74c3c;
        }

        .score-group {
            display: flex;
            gap: 20px;
        }

        #high-score {
            color: #888;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 1; 
            background-color: #f7f7f7;
            image-rendering: pixelated; 
            display: block;
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            gap: 12px;
            padding: 15px;
            box-sizing: border-box;
            background-color: #34495e;
            border-top: 2px solid #2c3e50;
        }

        @media (min-width: 768px) {
            #mobile-controls { display: none !important; }
        }

        .control-btn {
            flex: 1;
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px 0;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #7f8c8d;
            transition: all 0.1s ease;
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #7f8c8d;
            background-color: #7f8c8d;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(247, 247, 247, 0.93);
            z-index: 10;
        }

        .overlay-screen h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: #535353;
        }

        /* 💡 게임 오버 시 보여줄 통계창 디자인 */
        #game-over-stats {
            margin-bottom: 20px;
            text-align: center;
            color: #333;
            font-size: 18px;
            line-height: 1.8;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.05);
            padding: 15px 30px;
            border-radius: 10px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Segoe UI', sans-serif;
            margin-top: 10px;
        }

        .btn-start { background-color: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 0 0 #27ae60; }

        .btn-restart { background-color: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        .btn-restart:active { transform: translateY(4px); box-shadow: 0 0 0 #c0392b; }
    </style>
</head>
<body>

    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>🦖 티렉스 런</h1>
    </header>

    <div id="game-wrapper">
        <div id="game-container">
            
            <div id="score-board">
                <div id="time-display">⏱ 00:00</div>
                <div class="score-group">
                    <span id="high-score">HI 00000</span>
                    <span id="score">00000</span>
                </div>
            </div>
            
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            
            <div id="mobile-controls">
                <div id="btn-duck" class="control-btn">▼ 숙이기 (급강하)</div>
                <div id="btn-jump" class="control-btn">▲ 점프</div>
            </div>

            <div id="start-screen" class="overlay-screen">
                <h2>티렉스 런</h2>
                <p style="color: #888; font-family: 'Segoe UI', sans-serif; margin-bottom: 20px; text-align: center; line-height: 1.6;">
                    스페이스바, W, 화살표 위로 <strong>점프</strong><br>
                    공중에 떴을 때 S, 화살표 아래로 <strong>급강하!</strong>
                </p>
                <button class="btn btn-start" onclick="startGame()">게임 시작</button>
            </div>

            <div id="game-over-screen" class="overlay-screen" style="display: none;">
                <h2 style="color: #e74c3c;">GAME OVER</h2>
                <div id="game-over-stats"></div>
                <button class="btn btn-restart" onclick="startGame()">다시 달리기</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const timeElement = document.getElementById("time-display");
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const gameOverStats = document.getElementById("game-over-stats");

        const dinoUpImg = new Image(); dinoUpImg.src = 'DinoUp.png';
        const dinoDownImg = new Image(); dinoDownImg.src = 'DinoDown.png';
        const cactusImg = new Image(); cactusImg.src = 'Cactus.png';
        const birdImg = new Image(); birdImg.src = 'Bird.png';

        let animationId;
        let isPlaying = false;
        
        let lastTime = 0;
        let globalTime = 0;

        // 💡 타이머 관련 변수
        let startTime = 0;
        let formattedTime = "00:00";

        let score = 0;
        let highScore = localStorage.getItem("trexHighScore") || 0;
        highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');

        let gameSpeed = 16.0; 
        const groundY = 350; 

        const dino = {
            x: 60,
            w: 90, 
            h: 90, 
            y: 0, 
            dy: 0,
            gravity: 1.3,   
            jumpPower: -24.0, 
            isJumping: false,
            isDucking: false,
            
            init() {
                this.y = groundY - this.h;
                this.dy = 0;
                this.isJumping = false;
                this.isDucking = false;
            },

            update(timeScale) {
                if (this.isJumping && this.isDucking) {
                    this.dy += this.gravity * 5.0 * timeScale; 
                } else if (this.isJumping) {
                    this.dy += this.gravity * timeScale;
                }
                
                this.y += this.dy * timeScale;

                if (this.y + this.h >= groundY) {
                    this.y = groundY - this.h;
                    this.dy = 0;
                    this.isJumping = false;
                }
                
                this.draw();
            },
            
            draw() {
                let img = (this.isDucking && !this.isJumping) ? dinoDownImg : dinoUpImg;
                
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);

                if (img.complete && img.naturalHeight !== 0) {
                    ctx.drawImage(img, drawX, drawY, this.w, this.h);
                } else {
                    ctx.fillStyle = "#535353";
                    ctx.fillRect(drawX, drawY, this.w, (this.isDucking && !this.isJumping) ? this.h/2 : this.h);
                }
            },

            jump() {
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.dy = this.jumpPower;
                }
            },

            getHitBox() {
                if (this.isDucking && !this.isJumping) {
                    return { x: this.x + 10, y: this.y + 45, w: this.w - 20, h: 45 };
                } else {
                    return { x: this.x + 15, y: this.y + 10, w: this.w - 30, h: this.h - 15 };
                }
            }
        };

        dinoUpImg.onload = () => {
            if (!isPlaying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGround();
                dino.draw();
            }
        };

        let obstacles = [];
        let clouds = [];

        class Obstacle {
            constructor() {
                this.type = (score >= 200 && Math.random() > 0.7) ? 'bird' : 'cactus';
                this.x = canvas.width;
                
                if (this.type === 'cactus') {
                    this.count = Math.random() > 0.6 ? 2 : 1; 
                    this.baseW = Math.random() > 0.5 ? 55 : 80; 
                    this.h = Math.random() > 0.5 ? 85 : 120; 
                    this.w = this.baseW * this.count;
                    this.y = groundY - this.h;
                } else {
                    this.w = 70;
                    this.h = 50;
                    this.y = groundY - 105; 
                }
            }

            update(timeScale) {
                this.x -= gameSpeed * timeScale;
                this.draw();
            }

            draw() {
                let drawY = Math.floor(this.y);
                if (this.type === 'cactus') {
                    for (let i = 0; i < this.count; i++) {
                        let drawX = Math.floor(this.x + (i * this.baseW));
                        if (cactusImg.complete && cactusImg.naturalHeight !== 0) {
                            ctx.drawImage(cactusImg, drawX, drawY, this.baseW, this.h);
                        } else {
                            ctx.fillStyle = "#27ae60";
                            ctx.fillRect(drawX, drawY, this.baseW, this.h);
                        }
                    }
                } else {
                    let drawX = Math.floor(this.x);
                    if (birdImg.complete && birdImg.naturalHeight !== 0) {
                        let flapY = (Math.floor(globalTime) % 30 < 15) ? -4 : 4; 
                        ctx.drawImage(birdImg, drawX, drawY + flapY, this.w, this.h);
                    } else {
                        ctx.fillStyle = "#e74c3c";
                        let flap = (Math.floor(globalTime) % 20 < 10) ? -10 : 10; 
                        ctx.fillRect(drawX, drawY + 20, this.w, 20); 
                        ctx.fillRect(drawX + 15, drawY + 20 + flap, 25, 12); 
                    }
                }
            }
        }

        class Cloud {
            constructor() {
                this.x = canvas.width;
                this.y = Math.random() * 120 + 30; 
                this.w = 70;
                this.h = 25;
                this.speed = Math.random() * 0.5 + 1; 
            }
            update(timeScale) {
                this.x -= this.speed * timeScale;
                this.draw();
            }
            draw() {
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);
                ctx.fillStyle = "#e0e0e0";
                ctx.fillRect(drawX, drawY, this.w, this.h);
                ctx.fillRect(drawX + 15, drawY - 12, 40, 18);
            }
        }

        function drawGround() {
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = "#535353";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = "#888";
            for(let i = 0; i < 15; i++){
                let nx = ((Math.floor(globalTime) * (gameSpeed * 0.3)) + i * 90) % canvas.width;
                ctx.fillRect(Math.floor(canvas.width - nx), groundY + 5 + (i % 3) * 5, 4, 3);
            }
        }

        function checkCollision(obstacle) {
            const hitBox = dino.getHitBox();
            const padding = 10; 

            if (hitBox.x + padding < obstacle.x + obstacle.w - padding &&
                hitBox.x + hitBox.w - padding > obstacle.x + padding &&
                hitBox.y + padding < obstacle.y + obstacle.h - padding &&
                hitBox.y + hitBox.h - padding > obstacle.y + padding) {
                return true;
            }
            return false;
        }

        let lastCloudTime = 0;

        function animate(currentTime) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = currentTime;
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            let timeScale = deltaTime / (1000 / 60);
            if (timeScale > 3) timeScale = 1;

            globalTime += timeScale;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            // 💡 타이머 업데이트
            let now = Date.now();
            let diffSeconds = Math.floor((now - startTime) / 1000);
            let m = String(Math.floor(diffSeconds / 60)).padStart(2, '0');
            let s = String(diffSeconds % 60).padStart(2, '0');
            formattedTime = `${m}:${s}`;
            timeElement.innerText = `⏱ ${formattedTime}`;

            // 점수 업데이트
            score += gameSpeed * 0.02 * timeScale;
            scoreElement.innerText = String(Math.floor(score)).padStart(5, '0');

            gameSpeed = Math.min(16.0 + (score * 0.006), 40.0);

            if (globalTime - lastCloudTime > 180 || (globalTime === 0 && Math.random() > 0.5)) {
                clouds.push(new Cloud());
                lastCloudTime = globalTime;
            }

            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].update(timeScale);
                if (clouds[i].x + clouds[i].w < 0) {
                    clouds.splice(i, 1);
                }
            }

            let lastObs = obstacles[obstacles.length - 1];
            let minDistance = 650 + (gameSpeed * 13) + Math.random() * 250; 
            
            if (!lastObs || canvas.width - lastObs.x > minDistance) {
                if (Math.random() > 0.95) { 
                    obstacles.push(new Obstacle());
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.update(timeScale);
                
                if (checkCollision(obs)) {
                    gameOver();
                } else if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                }
            }

            dino.update(timeScale);
            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { 
                e.preventDefault(); 
                dino.jump(); 
            }
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                e.preventDefault(); 
                dino.isDucking = true; 
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                dino.isDucking = false; 
            }
        });

        const btnJump = document.getElementById('btn-jump');
        const btnDuck = document.getElementById('btn-duck');

        function bindButton(btn, onDown, onUp) {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); onDown(); });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); onUp(); });
            btn.addEventListener('pointerleave', (e) => { e.preventDefault(); onUp(); });
        }

        bindButton(btnJump, () => { if(isPlaying) dino.jump(); }, () => {});
        bindButton(btnDuck, () => { if(isPlaying) dino.isDucking = true; }, () => { dino.isDucking = false; });

        function startGame() {
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            
            obstacles = [];
            clouds = [];
            score = 0;
            scoreElement.innerText = "00000";
            
            // 타이머 초기화
            startTime = Date.now();
            formattedTime = "00:00";
            timeElement.innerText = `⏱ 00:00`;
            
            gameSpeed = 16.0;
            
            lastTime = 0;
            globalTime = 0;
            lastCloudTime = 0;
            
            dino.init();
            isPlaying = true;
            animationId = requestAnimationFrame(animate);
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("trexHighScore", highScore);
                highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');
            }

            // 💡 결과창 HTML 주입
            gameOverStats.innerHTML = `
                생존 시간 : <span style="color:#e74c3c;">${formattedTime}</span><br>
                현재 점수 : <span style="color:#f1c40f;">${Math.floor(score)}</span> 점<br>
                최고 점수 : <span style="color:#2ecc71;">${Math.floor(highScore)}</span> 점
            `;

            gameOverScreen.style.display = "flex";
        }

        dino.init();
    </script>
</body>
</html>
