<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>티렉스 런</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #535353;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            text-decoration: none;
            background: #535353;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 20;
            font-family: 'Segoe UI', sans-serif;
        }

        #game-container {
            width: 100%;
            max-width: 1000px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #score-board {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #high-score {
            color: #888;
            margin-right: 20px;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 10 / 4; 
            background-color: #f7f7f7;
            border-bottom: 2px solid #535353;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            image-rendering: pixelated; /* 도트가 깨지지 않게 선명히 유지 */
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            max-width: 1000px;
            gap: 12px;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        /* 💡 점프/숙이기 버튼 쫀득한 애니메이션 추가 */
        .control-btn {
            flex: 1;
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 12px;
            padding: 20px 0;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #bbb;
            transition: all 0.1s ease;
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #bbb;
            background-color: #d0d0d0;
        }

        .overlay-screen {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100% - 140px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(247, 247, 247, 0.85);
            z-index: 10;
        }

        .overlay-screen h2 {
            margin: 0 0 15px 0;
            font-size: 32px;
            color: #535353;
        }

        .btn {
            background-color: #535353;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
            transition: transform 0.1s;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #333;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">◀ 메인으로</a>

    <div id="game-container">
        <div id="score-board">
            <span id="high-score">HI 00000</span>
            <span id="score">00000</span>
        </div>
        
        <canvas id="gameCanvas" width="1000" height="400"></canvas>
        
        <div id="mobile-controls">
            <div id="btn-duck" class="control-btn">▼ 숙이기</div>
            <div id="btn-jump" class="control-btn">▲ 점프</div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h2>티렉스 런</h2>
            <p style="color: #888; font-family: 'Segoe UI', sans-serif; margin-bottom: 20px;">스페이스바, W, 화면 터치로 점프<br>Ctrl, S로 공중에서 급강하</p>
            <button class="btn" onclick="startGame()">게임 시작</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display: none;">
            <h2>GAME OVER</h2>
            <button class="btn" onclick="startGame()">다시 달리기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");

        const dinoUpImg = new Image(); dinoUpImg.src = 'DinoUp.png';
        const dinoDownImg = new Image(); dinoDownImg.src = 'DinoDown.png';
        const cactusImg = new Image(); cactusImg.src = 'Cactus.png';
        const birdImg = new Image(); birdImg.src = 'Bird.png';

        dinoUpImg.onload = () => {
            if (!isPlaying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGround();
                dino.draw();
            }
        };

        let animationId;
        let isPlaying = false;
        
        let score = 0;
        let highScore = localStorage.getItem("trexHighScore") || 0;
        highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');

        let gameSpeed = 7.5; 
        let frameCount = 0;

        // 바닥 높이 설정
        const groundY = 350; 

        // 💡 1. 공룡 크기 대폭 상향 (90x90)
        const dino = {
            x: 60,
            w: 90, // 기존 56에서 90으로 상향
            h: 90, 
            y: 0, 
            dy: 0,
            gravity: 0.7,   // 몸집이 커졌으므로 중력을 살짝 무겁게 조정
            jumpPower: -18, // 더 높이 뛰도록 점프력 상향
            isJumping: false,
            isDucking: false,
            
            init() {
                this.y = groundY - this.h;
                this.dy = 0;
                this.isJumping = false;
                this.isDucking = false;
            },

            update() {
                if (this.isJumping && this.isDucking) {
                    this.dy += this.gravity * 3.5; 
                } else if (this.isJumping) {
                    this.dy += this.gravity;
                }
                
                this.y += this.dy;

                if (this.y + this.h >= groundY) {
                    this.y = groundY - this.h;
                    this.dy = 0;
                    this.isJumping = false;
                }
                
                this.draw();
            },
            
            draw() {
                let img = (this.isDucking && !this.isJumping) ? dinoDownImg : dinoUpImg;
                
                if (img.complete && img.naturalHeight !== 0) {
                    ctx.drawImage(img, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#535353";
                    ctx.fillRect(this.x, this.y, this.w, (this.isDucking && !this.isJumping) ? this.h/2 : this.h);
                }
            },

            jump() {
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.dy = this.jumpPower;
                }
            },

            // 💡 커진 덩치에 맞춰 정교하게 계산된 피격 판정(Hitbox)
            getHitBox() {
                if (this.isDucking && !this.isJumping) {
                    // 숙였을 때
                    return { x: this.x + 10, y: this.y + 45, w: this.w - 20, h: 45 };
                } else {
                    // 서있을 때
                    return { x: this.x + 15, y: this.y + 10, w: this.w - 30, h: this.h - 15 };
                }
            }
        };

        let obstacles = [];
        let clouds = [];

        class Obstacle {
            constructor() {
                this.type = (score >= 200 && Math.random() > 0.7) ? 'bird' : 'cactus';
                this.x = canvas.width;
                this.passed = false; 

                if (this.type === 'cactus') {
                    // 💡 2. 쌍둥이 선인장 패턴 추가 (40% 확률로 2연속 선인장)
                    this.count = Math.random() > 0.6 ? 2 : 1; 
                    
                    // 선인장 1개의 기본 크기도 대폭 상향
                    this.baseW = Math.random() > 0.5 ? 55 : 80; 
                    this.h = Math.random() > 0.5 ? 85 : 120; 
                    
                    // 총 넓이는 선인장 갯수만큼 곱함
                    this.w = this.baseW * this.count;
                    this.y = groundY - this.h;
                } else {
                    // 새(익룡) 크기도 상향
                    this.w = 70;
                    this.h = 50;
                    // 서 있으면 부딪히고, 숙이면 피할 수 있는 절묘한 Y좌표 계산
                    this.y = groundY - 105; 
                }
            }

            update() {
                this.x -= gameSpeed;
                this.draw();
            }

            draw() {
                if (this.type === 'cactus') {
                    // 쌍둥이 선인장이면 2번 반복해서 그리기
                    for (let i = 0; i < this.count; i++) {
                        let drawX = this.x + (i * this.baseW);
                        if (cactusImg.complete && cactusImg.naturalHeight !== 0) {
                            ctx.drawImage(cactusImg, drawX, this.y, this.baseW, this.h);
                        } else {
                            ctx.fillStyle = "#27ae60";
                            ctx.fillRect(drawX, this.y, this.baseW, this.h);
                        }
                    }
                } else {
                    if (birdImg.complete && birdImg.naturalHeight !== 0) {
                        let flapY = (frameCount % 30 < 15) ? -4 : 4; 
                        ctx.drawImage(birdImg, this.x, this.y + flapY, this.w, this.h);
                    } else {
                        ctx.fillStyle = "#e74c3c";
                        let flap = (frameCount % 20 < 10) ? -10 : 10; 
                        ctx.fillRect(this.x, this.y + 20, this.w, 20); 
                        ctx.fillRect(this.x + 15, this.y + 20 + flap, 25, 12); 
                    }
                }
            }
        }

        class Cloud {
            constructor() {
                this.x = canvas.width;
                this.y = Math.random() * 120 + 30; 
                this.w = 70;
                this.h = 25;
                this.speed = Math.random() * 0.5 + 1; 
            }
            update() {
                this.x -= this.speed;
                this.draw();
            }
            draw() {
                ctx.fillStyle = "#e0e0e0";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillRect(this.x + 15, this.y - 12, 40, 18);
            }
        }

        function drawGround() {
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = "#535353";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = "#888";
            for(let i=0; i<15; i++){
                let nx = ((frameCount * 2) + i * 90) % canvas.width;
                ctx.fillRect(canvas.width - nx, groundY + 5 + (i%3)*5, 4, 3);
            }
        }

        function checkCollision(obstacle) {
            const hitBox = dino.getHitBox();
            const padding = 10; // 충돌 여유값

            if (hitBox.x + padding < obstacle.x + obstacle.w - padding &&
                hitBox.x + hitBox.w - padding > obstacle.x + padding &&
                hitBox.y + padding < obstacle.y + obstacle.h - padding &&
                hitBox.y + hitBox.h - padding > obstacle.y + padding) {
                return true;
            }
            return false;
        }

        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            // 💡 3. 점수 시스템 롤백: 달리기만 해도 쭉쭉 증가!
            score += gameSpeed * 0.02;
            scoreElement.innerText = String(Math.floor(score)).padStart(5, '0');

            // 속도도 점수에 비례해 서서히 빨라짐 (최대 속도 22)
            gameSpeed = Math.min(7.5 + (score * 0.002), 22);

            if (frameCount % 180 === 0 || (frameCount === 0 && Math.random() > 0.5)) {
                clouds.push(new Cloud());
            }
            clouds.forEach((cloud, index) => {
                cloud.update();
                if (cloud.x + cloud.w < 0) clouds.splice(index, 1);
            });

            // 덩치들이 커진 만큼 생성 간격을 여유 있게(최소 550픽셀 이상) 띄워줌
            let lastObs = obstacles[obstacles.length - 1];
            let minDistance = 550 + (gameSpeed * 15) + Math.random() * 250; 
            
            if (!lastObs || canvas.width - lastObs.x > minDistance) {
                if (Math.random() > 0.95) { 
                    obstacles.push(new Obstacle());
                }
            }

            obstacles.forEach((obstacle, index) => {
                obstacle.update();
                
                if (checkCollision(obstacle)) {
                    gameOver();
                }

                if (obstacle.x + obstacle.w < 0) {
                    obstacles.splice(index, 1);
                }
            });

            dino.update();
            frameCount++;
            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { 
                e.preventDefault(); 
                dino.jump(); 
            }
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                e.preventDefault(); 
                dino.isDucking = true; 
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                dino.isDucking = false; 
            }
        });

        const btnJump = document.getElementById('btn-jump');
        const btnDuck = document.getElementById('btn-duck');

        // pointerdown 이벤트로 모바일 인풋 딜레이 제거
        function bindButton(btn, onDown, onUp) {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); onDown(); });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); onUp(); });
            btn.addEventListener('pointerleave', (e) => { e.preventDefault(); onUp(); });
        }

        bindButton(btnJump, () => { if(isPlaying) dino.jump(); }, () => {});
        bindButton(btnDuck, () => { if(isPlaying) dino.isDucking = true; }, () => { dino.isDucking = false; });

        function startGame() {
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            
            obstacles = [];
            clouds = [];
            score = 0;
            scoreElement.innerText = "00000";
            gameSpeed = 7.5;
            frameCount = 0;
            
            dino.init();
            isPlaying = true;
            animate();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("trexHighScore", highScore);
                highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');
            }
            gameOverScreen.style.display = "flex";
        }

        dino.init();
    </script>
</body>
</html>
