<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>티렉스 런 (초고속 & 렌더링 최적화)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #535353;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            text-decoration: none;
            background: #535353;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 20;
            font-family: 'Segoe UI', sans-serif;
        }

        #game-container {
            width: 100%;
            max-width: 800px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #score-board {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #high-score {
            color: #888;
            margin-right: 20px;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 1; 
            background-color: #f7f7f7;
            border-bottom: 2px solid #535353;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            image-rendering: pixelated; 
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            gap: 12px;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        .control-btn {
            flex: 1;
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 12px;
            padding: 20px 0;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #bbb;
            transition: all 0.1s ease;
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #bbb;
            background-color: #d0d0d0;
        }

        .overlay-screen {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100% - 140px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(247, 247, 247, 0.85);
            z-index: 10;
        }

        .overlay-screen h2 {
            margin: 0 0 15px 0;
            font-size: 32px;
            color: #535353;
        }

        .btn {
            background-color: #535353;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
            transition: transform 0.1s;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #333;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">◀ 메인으로</a>

    <div id="game-container">
        <div id="score-board">
            <span id="high-score">HI 00000</span>
            <span id="score">00000</span>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="mobile-controls">
            <div id="btn-duck" class="control-btn">▼ 숙이기</div>
            <div id="btn-jump" class="control-btn">▲ 점프</div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h2>티렉스 런</h2>
            <p style="color: #888; font-family: 'Segoe UI', sans-serif; margin-bottom: 20px;">스페이스바, W, 화면 터치로 점프<br>Ctrl, S로 공중에서 급강하</p>
            <button class="btn" onclick="startGame()">게임 시작</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display: none;">
            <h2>GAME OVER</h2>
            <button class="btn" onclick="startGame()">다시 달리기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");

        const dinoUpImg = new Image(); dinoUpImg.src = 'DinoUp.png';
        const dinoDownImg = new Image(); dinoDownImg.src = 'DinoDown.png';
        const cactusImg = new Image(); cactusImg.src = 'Cactus.png';
        const birdImg = new Image(); birdImg.src = 'Bird.png';

        let animationId;
        let isPlaying = false;
        
        let lastTime = 0;
        let globalTime = 0;

        let score = 0;
        let highScore = localStorage.getItem("trexHighScore") || 0;
        highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');

        // 💡 미친 속도 시작: 16.0
        let gameSpeed = 16.0; 

        const groundY = 350; 

        const dino = {
            x: 60,
            w: 90, 
            h: 90, 
            y: 0, 
            dy: 0,
            // 💡 초고속 맞춤형 극한의 중력 엔진 (빠르게 튀어오르고 바위처럼 떨어짐)
            gravity: 1.3,   
            jumpPower: -24.0, 
            isJumping: false,
            isDucking: false,
            
            init() {
                this.y = groundY - this.h;
                this.dy = 0;
                this.isJumping = false;
                this.isDucking = false;
            },

            update(timeScale) {
                if (this.isJumping && this.isDucking) {
                    this.dy += this.gravity * 5.0 * timeScale; // 공중에서 꽂히는 속도 5배
                } else if (this.isJumping) {
                    this.dy += this.gravity * timeScale;
                }
                
                this.y += this.dy * timeScale;

                if (this.y + this.h >= groundY) {
                    this.y = groundY - this.h;
                    this.dy = 0;
                    this.isJumping = false;
                }
                
                this.draw();
            },
            
            draw() {
                let img = (this.isDucking && !this.isJumping) ? dinoDownImg : dinoUpImg;
                
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);

                if (img.complete && img.naturalHeight !== 0) {
                    ctx.drawImage(img, drawX, drawY, this.w, this.h);
                } else {
                    ctx.fillStyle = "#535353";
                    ctx.fillRect(drawX, drawY, this.w, (this.isDucking && !this.isJumping) ? this.h/2 : this.h);
                }
            },

            jump() {
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.dy = this.jumpPower;
                }
            },

            getHitBox() {
                if (this.isDucking && !this.isJumping) {
                    return { x: this.x + 10, y: this.y + 45, w: this.w - 20, h: 45 };
                } else {
                    return { x: this.x + 15, y: this.y + 10, w: this.w - 30, h: this.h - 15 };
                }
            }
        };

        dinoUpImg.onload = () => {
            if (!isPlaying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGround();
                dino.draw();
            }
        };

        let obstacles = [];
        let clouds = [];

        class Obstacle {
            constructor() {
                this.type = (score >= 200 && Math.random() > 0.7) ? 'bird' : 'cactus';
                this.x = canvas.width;
                
                if (this.type === 'cactus') {
                    this.count = Math.random() > 0.6 ? 2 : 1; 
                    this.baseW = Math.random() > 0.5 ? 55 : 80; 
                    this.h = Math.random() > 0.5 ? 85 : 120; 
                    this.w = this.baseW * this.count;
                    this.y = groundY - this.h;
                } else {
                    this.w = 70;
                    this.h = 50;
                    this.y = groundY - 105; 
                }
            }

            update(timeScale) {
                this.x -= gameSpeed * timeScale;
                this.draw();
            }

            draw() {
                let drawY = Math.floor(this.y);
                if (this.type === 'cactus') {
                    for (let i = 0; i < this.count; i++) {
                        let drawX = Math.floor(this.x + (i * this.baseW));
                        if (cactusImg.complete && cactusImg.naturalHeight !== 0) {
                            ctx.drawImage(cactusImg, drawX, drawY, this.baseW, this.h);
                        } else {
                            ctx.fillStyle = "#27ae60";
                            ctx.fillRect(drawX, drawY, this.baseW, this.h);
                        }
                    }
                } else {
                    let drawX = Math.floor(this.x);
                    if (birdImg.complete && birdImg.naturalHeight !== 0) {
                        let flapY = (Math.floor(globalTime) % 30 < 15) ? -4 : 4; 
                        ctx.drawImage(birdImg, drawX, drawY + flapY, this.w, this.h);
                    } else {
                        ctx.fillStyle = "#e74c3c";
                        let flap = (Math.floor(globalTime) % 20 < 10) ? -10 : 10; 
                        ctx.fillRect(drawX, drawY + 20, this.w, 20); 
                        ctx.fillRect(drawX + 15, drawY + 20 + flap, 25, 12); 
                    }
                }
            }
        }

        class Cloud {
            constructor() {
                this.x = canvas.width;
                this.y = Math.random() * 120 + 30; 
                this.w = 70;
                this.h = 25;
                this.speed = Math.random() * 0.5 + 1; 
            }
            update(timeScale) {
                this.x -= this.speed * timeScale;
                this.draw();
            }
            draw() {
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);
                ctx.fillStyle = "#e0e0e0";
                ctx.fillRect(drawX, drawY, this.w, this.h);
                ctx.fillRect(drawX + 15, drawY - 12, 40, 18);
            }
        }

        function drawGround() {
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = "#535353";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = "#888";
            for(let i = 0; i < 15; i++){
                let nx = ((Math.floor(globalTime) * (gameSpeed * 0.3)) + i * 90) % canvas.width;
                ctx.fillRect(Math.floor(canvas.width - nx), groundY + 5 + (i % 3) * 5, 4, 3);
            }
        }

        function checkCollision(obstacle) {
            const hitBox = dino.getHitBox();
            const padding = 10; 

            if (hitBox.x + padding < obstacle.x + obstacle.w - padding &&
                hitBox.x + hitBox.w - padding > obstacle.x + padding &&
                hitBox.y + padding < obstacle.y + obstacle.h - padding &&
                hitBox.y + hitBox.h - padding > obstacle.y + padding) {
                return true;
            }
            return false;
        }

        let lastCloudTime = 0;

        function animate(currentTime) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = currentTime;
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            let timeScale = deltaTime / (1000 / 60);
            if (timeScale > 3) timeScale = 1;

            globalTime += timeScale;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            score += gameSpeed * 0.02 * timeScale;
            scoreElement.innerText = String(Math.floor(score)).padStart(5, '0');

            // 💡 최고 속도 제한 40, 가속도를 0.006으로 펌핑
            gameSpeed = Math.min(16.0 + (score * 0.006), 40.0);

            if (globalTime - lastCloudTime > 180 || (globalTime === 0 && Math.random() > 0.5)) {
                clouds.push(new Cloud());
                lastCloudTime = globalTime;
            }

            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].update(timeScale);
                if (clouds[i].x + clouds[i].w < 0) {
                    clouds.splice(i, 1);
                }
            }

            // 엄청나게 빠른 속도에 맞춰 장애물 스폰 최소 간격 조정
            let lastObs = obstacles[obstacles.length - 1];
            let minDistance = 650 + (gameSpeed * 13) + Math.random() * 250; 
            
            if (!lastObs || canvas.width - lastObs.x > minDistance) {
                if (Math.random() > 0.95) { 
                    obstacles.push(new Obstacle());
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.update(timeScale);
                
                if (checkCollision(obs)) {
                    gameOver();
                } else if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                }
            }

            dino.update(timeScale);
            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { 
                e.preventDefault(); 
                dino.jump(); 
            }
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                e.preventDefault(); 
                dino.isDucking = true; 
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ControlLeft' || e.code === 'ControlRight') { 
                dino.isDucking = false; 
            }
        });

        const btnJump = document.getElementById('btn-jump');
        const btnDuck = document.getElementById('btn-duck');

        function bindButton(btn, onDown, onUp) {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); onDown(); });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); onUp(); });
            btn.addEventListener('pointerleave', (e) => { e.preventDefault(); onUp(); });
        }

        bindButton(btnJump, () => { if(isPlaying) dino.jump(); }, () => {});
        bindButton(btnDuck, () => { if(isPlaying) dino.isDucking = true; }, () => { dino.isDucking = false; });

        function startGame() {
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            
            obstacles = [];
            clouds = [];
            score = 0;
            scoreElement.innerText = "00000";
            
            // 💡 시작 속도 세팅
            gameSpeed = 16.0;
            
            lastTime = 0;
            globalTime = 0;
            lastCloudTime = 0;
            
            dino.init();
            isPlaying = true;
            animationId = requestAnimationFrame(animate);
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("trexHighScore", highScore);
                highScoreElement.innerText = "HI " + String(Math.floor(highScore)).padStart(5, '0');
            }
            gameOverScreen.style.display = "flex";
        }

        dino.init();
    </script>
</body>
</html>
