<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>벽돌 깨기 (속도 8.0 업그레이드)</title>
    <style>
        /* 💡 모바일 화면 잘림 방지를 위해 height: 100dvh 적용 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; /* 기본 지원 */
            height: 100dvh; /* 최신 모바일 브라우저용 동적 높이 지원 */
            background-color: #1a1a2e; 
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }

        .btn-main-go:hover { background: #27ae60; }
        .btn-main-go:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #27ae60;
        }

        h1 {
            color: #f1c40f;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            font-weight: 900;
        }

        #game-wrapper {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden; /* 영역 밖으로 밀려나는 것 방지 */
        }

        #game-header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .header-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .high-score-text {
            font-size: 12px;
            color: #f1c40f;
            margin-top: 4px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            padding: 0 10px 20px 10px; 
            box-sizing: border-box;
        }

        canvas {
            background-color: #16213e;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 2px solid #0f3460;
            touch-action: none; 
            display: block;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 10px;
            right: 10px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(26, 26, 46, 0.9);
            border-radius: 10px;
            z-index: 10;
            text-align: center;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s;
            margin: 10px 5px;
            width: 200px;
        }

        .btn-purple {
            background-color: #9b59b6;
            box-shadow: 0 4px 10px rgba(155, 89, 182, 0.4);
        }

        .btn:active { transform: scale(0.95); }
        .btn-gold { background-color: #f1c40f; color: #333; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.4); }
    </style>
</head>
<body>
    
    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>🧱 벽돌 깨기</h1>
    </header>

    <div id="game-wrapper">
        <div id="game-header">
            <div class="header-group" style="align-items: flex-start;">
                <span id="header-mode-info">스테이지: <span id="stage-display" style="color: #f1c40f;">1</span></span>
                <span class="high-score-text">최고 점수: <span id="high-score">0</span></span>
            </div>
            <div class="header-group">
                <span>점수: <span id="score">0</span></span>
            </div>
            <div class="header-group" style="align-items: flex-end;">
                <span>공 개수: <span id="ball-count">1</span></span>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-screen" class="overlay-screen">
                <h2 id="message" style="margin-bottom: 20px; color: #fff;">멀티볼 벽돌 깨기!</h2>
                <button class="btn" onclick="startGame('stage')">🎯 스테이지 모드</button>
                <button class="btn btn-purple" onclick="startGame('infinite')">🔥 무한 모드</button>
            </div>

            <div id="next-stage-screen" class="overlay-screen" style="display: none;">
                <h2 style="color: #f1c40f; margin-bottom: 10px; font-size: 28px;">STAGE CLEAR!</h2>
                <p style="color: #ecf0f1; margin-bottom: 5px;">점수를 유지한 채 다음 스테이지로 이동합니다.</p>
                <p style="color: #e74c3c; font-weight: bold; font-size: 14px; margin-bottom: 20px;">주의: 벽돌의 최대 체력이 5 증가합니다!</p>
                <button class="btn btn-gold" onclick="nextStage()">다음 스테이지 도전</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const scoreDisplay = document.getElementById("score");
        const ballCountDisplay = document.getElementById("ball-count");
        const headerModeInfo = document.getElementById("header-mode-info");
        const highScoreDisplay = document.getElementById("high-score");
        
        const startScreen = document.getElementById("start-screen");
        const nextStageScreen = document.getElementById("next-stage-screen");
        const messageDisplay = document.getElementById("message");

        let stageHighScore = localStorage.getItem('brickStageHighScore') || 0;
        let infiniteHighScore = localStorage.getItem('brickInfiniteHighScore') || 0;

        let animationId;
        let isPlaying = false;
        let score = 0;
        let gameMode = 'stage'; 
        let stage = 1;

        let lastDropTime = 0;
        const dropInterval = 5000; 
        let linesDropped = 0;
        let currentMaxHp = 5;

        let lastTime = 0;

        let paddleHeight = 15;
        let paddleWidth = 150;
        let paddleX = 0; 
        
        let ballRadius = 8;
        let balls = []; 
        let baseSpeed = 8.0; 

        let brickColumnCount = 7;
        let brickRowCount = 8; 
        let brickPadding = 6;
        let brickOffsetTop = 60; 
        let brickHeight = 35; 
        let grid = []; 

        const hpColors = ["#4cd137", "#00a8ff", "#9c88ff", "#fbc531", "#e84118", "#e1b12c", "#c23616", "#2f3640", "#ff0000", "#000000"];

        // 💡 핵심 수정: 모바일 브라우저의 실제 가시 영역에 맞춰 캔버스 크기 계산
        function resizeCanvas() {
            const container = document.getElementById("canvas-container");
            const headerObj = document.querySelector("header");
            const gameHeaderObj = document.getElementById("game-header");
            
            // 모바일 URL 주소창 등을 제외한 실제 화면 높이(window.innerHeight)에서 
            // 위쪽 헤더들의 높이와 하단 여백(30px)을 빼서 안전한 캔버스 높이를 구합니다.
            let availableHeight = window.innerHeight - headerObj.offsetHeight - gameHeaderObj.offsetHeight - 30;

            canvas.width = container.clientWidth - 20; 
            canvas.height = availableHeight;
            
            if (!isPlaying) {
                paddleX = (canvas.width - paddleWidth) / 2;
            } else {
                if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
            }
        }
        
        // 화면 크기가 변할 때(주소창이 사라지거나 나타날 때) 즉각적으로 사이즈 조절
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initGrid(isInfinite) {
            grid = [];
            let rows = isInfinite ? 8 : brickRowCount;
            let maxHp = isInfinite ? currentMaxHp : stage * 5;

            let forceR = Math.floor(Math.random() * rows);
            let forceC = Math.floor(Math.random() * brickColumnCount);

            for (let r = 0; r < rows; r++) {
                let row = [];
                let brickWidth = (canvas.width - (brickPadding * (brickColumnCount + 1))) / brickColumnCount;
                
                for (let c = 0; c < brickColumnCount; c++) {
                    let rand = Math.random();
                    let isForceItem = (r === forceR && c === forceC);

                    if (rand < 0.15 && !isForceItem) {
                        row.push({ status: 0, hp: 0, isItem: false, w: brickWidth, h: brickHeight });
                    } else if (isForceItem || rand > 0.97) { 
                        row.push({ status: 1, hp: 1, isItem: true, w: brickWidth, h: brickHeight });
                    } else {
                        let randomHp = Math.floor(Math.random() * maxHp) + 1;
                        row.push({ status: 1, hp: randomHp, isItem: false, w: brickWidth, h: brickHeight });
                    }
                }
                grid.push(row);
            }
        }

        function dropBricks() {
            let row = [];
            let brickWidth = (canvas.width - (brickPadding * (brickColumnCount + 1))) / brickColumnCount;
            
            for (let c = 0; c < brickColumnCount; c++) {
                let rand = Math.random();
                if (rand < 0.15) {
                    row.push({ status: 0, hp: 0, isItem: false, w: brickWidth, h: brickHeight });
                } else if (rand > 0.97) {
                    row.push({ status: 1, hp: 1, isItem: true, w: brickWidth, h: brickHeight });
                } else {
                    let randomHp = Math.floor(Math.random() * currentMaxHp) + 1;
                    row.push({ status: 1, hp: randomHp, isItem: false, w: brickWidth, h: brickHeight });
                }
            }

            grid.unshift(row);
            linesDropped++;
            
            currentMaxHp = Math.min(5 + Math.floor(linesDropped / 2), 30);
            document.getElementById("max-hp-display").innerText = currentMaxHp;

            for (let r = 0; r < grid.length; r++) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                if (brickY + brickHeight > canvas.height - paddleHeight - 20) {
                    for (let c = 0; c < brickColumnCount; c++) {
                        if (grid[r][c].status === 1) {
                            gameOver(); 
                            return;
                        }
                    }
                }
            }
        }

        function createBall(x, y, dx, dy) {
            balls.push({ x: x, y: y, dx: dx, dy: dy });
        }

        function fireMultiBalls() {
            const extraBalls = 5;
            for (let i = 0; i < extraBalls; i++) {
                let angleDeg = 30 + (120 / extraBalls) * i; 
                let angleRad = angleDeg * Math.PI / 180;
                
                let startX = paddleX + paddleWidth / 2;
                let startY = canvas.height - paddleHeight - ballRadius - 5;
                
                let dx = Math.cos(angleRad) * baseSpeed;
                let dy = -Math.sin(angleRad) * baseSpeed;
                
                createBall(startX, startY, dx, dy);
            }
            if (balls.length > 150) balls.splice(150);
        }

        function movePaddle(e) {
            if (!isPlaying) return;
            let clientX;
            if (e.touches) clientX = e.touches[0].clientX;
            else clientX = e.clientX;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let relativeX = (clientX - rect.left) * scaleX;
            
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
            
            if (paddleX < 0) paddleX = 0;
            if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
        }

        document.addEventListener("mousemove", movePaddle);
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); movePaddle(e); }, { passive: false });

        function drawTimerBar() {
            let elapsed = Date.now() - lastDropTime;
            let ratio = elapsed / dropInterval;
            if (ratio > 1) ratio = 1;
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(0, 0, canvas.width * ratio, 6);
        }

        function drawBalls() {
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = "#00d2d3";
                ctx.shadowColor = "rgba(0, 210, 211, 0.5)";
                ctx.shadowBlur = 5;
                ctx.fill();
                ctx.shadowBlur = 0; 
                ctx.closePath();
            });
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight, 5);
            ctx.fillStyle = "#e94560";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    let b = grid[r][c];
                    if (b.status === 1) {
                        let brickX = (c * (b.w + brickPadding)) + brickPadding;
                        let brickY = (r * (b.h + brickPadding)) + brickOffsetTop;
                        b.x = brickX;
                        b.y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, b.w, b.h, 4);
                        
                        ctx.font = "bold 15px Arial";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";

                        if (b.isItem) {
                            ctx.fillStyle = "#f1c40f"; 
                            ctx.fill();
                            ctx.fillStyle = "#000";
                            ctx.fillText("+5", brickX + b.w / 2, brickY + b.h / 2);
                        } else {
                            ctx.fillStyle = hpColors[(b.hp - 1) % hpColors.length];
                            ctx.fill();
                            ctx.fillStyle = "#fff";
                            ctx.fillText(b.hp, brickX + b.w / 2, brickY + b.h / 2);
                        }
                        ctx.closePath();
                    }
                }
            }
        }

        function collisionDetection() {
            for (let i = 0; i < balls.length; i++) {
                let ball = balls[i];
                let hitInThisFrame = false; 

                for (let r = 0; r < grid.length; r++) {
                    for (let c = 0; c < brickColumnCount; c++) {
                        let b = grid[r][c];
                        if (b.status === 1) {
                            if (ball.x + ballRadius > b.x && ball.x - ballRadius < b.x + b.w && 
                                ball.y + ballRadius > b.y && ball.y - ballRadius < b.y + b.h) {
                                
                                let overlapLeft = (ball.x + ballRadius) - b.x;
                                let overlapRight = (b.x + b.w) - (ball.x - ballRadius);
                                let overlapTop = (ball.y + ballRadius) - b.y;
                                let overlapBottom = (b.y + b.h) - (ball.y - ballRadius);

                                let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                                if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                                    ball.dx = -ball.dx; 
                                } else {
                                    ball.dy = -ball.dy; 
                                }
                                
                                b.hp -= 1; 
                                score += 2; 

                                if (b.hp <= 0) {
                                    b.status = 0; 
                                    score += 10; 
                                    if (b.isItem) fireMultiBalls();
                                }
                                
                                hitInThisFrame = true; 
                                break; 
                            }
                        }
                    }
                    if (hitInThisFrame) break; 
                }
            }
        }

        function draw(currentTime) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = currentTime;
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            let timeScale = deltaTime / (1000 / 60);
            if (timeScale > 3) timeScale = 1;

            if (gameMode === 'infinite') {
                if (Date.now() - lastDropTime > dropInterval) {
                    dropBricks();
                    lastDropTime = Date.now();
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameMode === 'infinite') drawTimerBar(); 
            
            drawBricks();
            drawBalls();
            drawPaddle();
            collisionDetection();

            scoreDisplay.innerText = score;
            ballCountDisplay.innerText = balls.length;

            let activeBalls = [];

            for (let i = 0; i < balls.length; i++) {
                let ball = balls[i];

                if (ball.x + ball.dx * timeScale > canvas.width - ballRadius || ball.x + ball.dx * timeScale < ballRadius) {
                    ball.dx = -ball.dx;
                }
                if (ball.y + ball.dy * timeScale < ballRadius) {
                    ball.dy = -ball.dy;
                }
                
                if (ball.y + ball.dy * timeScale > canvas.height - paddleHeight - ballRadius - 10) {
                    if (ball.x > paddleX - ballRadius && ball.x < paddleX + paddleWidth + ballRadius) {
                        let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                        let normalizedHit = hitPoint / (paddleWidth / 2);
                        let maxAngle = 60 * Math.PI / 180;
                        let bounceAngle = normalizedHit * maxAngle;
                        
                        ball.dx = Math.sin(bounceAngle) * baseSpeed;
                        ball.dy = -Math.cos(bounceAngle) * baseSpeed;
                        
                    } else if (ball.y + ball.dy * timeScale > canvas.height) {
                        continue; 
                    }
                }

                if (Math.abs(ball.dy) < 0.5) {
                    ball.dy = ball.dy > 0 ? 0.5 : -0.5;
                }

                ball.x += ball.dx * timeScale;
                ball.y += ball.dy * timeScale;
                activeBalls.push(ball); 
            }

            balls = activeBalls; 

            let bricksLeft = false;
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    if (grid[r][c].status === 1) bricksLeft = true;
                }
            }

            if (!bricksLeft) {
                if (gameMode === 'stage') {
                    isPlaying = false;
                    nextStageScreen.style.display = "flex";
                    return; 
                } else if (gameMode === 'infinite') {
                    score += 100; 
                    dropBricks(); 
                    lastDropTime = Date.now();
                }
            }

            if (balls.length === 0) {
                gameOver();
                return;
            }

            animationId = requestAnimationFrame(draw);
        }

        function startGame(selectedMode) {
            gameMode = selectedMode;
            startScreen.style.display = "none";
            nextStageScreen.style.display = "none";
            
            resizeCanvas();
            
            paddleWidth = 150;
            paddleX = (canvas.width - paddleWidth) / 2;
            balls = [];
            createBall(canvas.width / 2, canvas.height - paddleHeight - ballRadius - 15, (Math.random() > 0.5 ? 1 : -1) * baseSpeed, -baseSpeed);
            
            if (gameMode === 'stage') {
                stage = 1;
                score = 0;
                brickOffsetTop = 60;
                highScoreDisplay.innerText = stageHighScore;
                headerModeInfo.innerHTML = '스테이지: <span id="stage-display" style="color: #f1c40f;">1</span>';
                initGrid(false);
            } else {
                score = 0;
                linesDropped = 0;
                currentMaxHp = 5;
                brickOffsetTop = 30;
                highScoreDisplay.innerText = infiniteHighScore;
                headerModeInfo.innerHTML = '최대 체력: <span id="max-hp-display" style="color: #e74c3c;">5</span>';
                initGrid(true);
                lastDropTime = Date.now();
            }
            
            isPlaying = true;
            lastTime = 0; 
            animationId = requestAnimationFrame(draw);
        }

        function nextStage() {
            nextStageScreen.style.display = "none";
            stage += 1;
            document.getElementById("stage-display").innerText = stage;
            
            paddleX = (canvas.width - paddleWidth) / 2;
            initGrid(false); 
            
            balls = [];
            createBall(paddleX + paddleWidth / 2, canvas.height - paddleHeight - ballRadius - 15, (Math.random() > 0.5 ? 1 : -1) * baseSpeed, -baseSpeed);
            
            isPlaying = true;
            lastTime = 0;
            animationId = requestAnimationFrame(draw);
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (gameMode === 'stage') {
                if (score > stageHighScore) {
                    stageHighScore = score;
                    localStorage.setItem('brickStageHighScore', stageHighScore);
                }
                messageDisplay.innerHTML = `게임 오버!<br><br>도달: 스테이지 ${stage}<br>최종 점수: <span style="color:#f1c40f;">${score}</span> 점`;
            } else {
                if (score > infiniteHighScore) {
                    infiniteHighScore = score;
                    localStorage.setItem('brickInfiniteHighScore', infiniteHighScore);
                }
                messageDisplay.innerHTML = `게임 오버!<br><br>최종 점수: <span style="color:#f1c40f;">${score}</span> 점`;
            }

            highScoreDisplay.innerText = gameMode === 'stage' ? stageHighScore : infiniteHighScore;
            startScreen.style.display = "flex";
        }

        highScoreDisplay.innerText = stageHighScore;
    </script>
</body>
</html>
