<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>벽돌 깨기 (30구 & 회수 시스템)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            background-color: #1a1a2e; 
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }
        .btn-main-go:hover { background: #27ae60; }
        .btn-main-go:active { transform: translateY(4px); box-shadow: 0 0 0 #27ae60; }

        h1 {
            color: #f1c40f;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            font-weight: 900;
        }

        #game-wrapper {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #game-header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .header-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .high-score-text {
            font-size: 12px;
            color: #f1c40f;
            margin-top: 4px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            padding: 0 10px 20px 10px; 
            box-sizing: border-box;
        }

        canvas {
            background-color: #16213e;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 2px solid #0f3460;
            touch-action: none; 
            display: block;
        }

        /* 💡 즉시 회수 버튼: 슬라이드(패들)보다 안전하게 위로 띄움 */
        #btn-recall {
            position: absolute;
            bottom: 100px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #e74c3c;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
            cursor: pointer;
            display: none; 
            z-index: 5;
            transition: all 0.1s;
        }
        #btn-recall:active { transform: translateX(-50%) translateY(4px); box-shadow: 0 0 0 #c0392b; }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 10px;
            right: 10px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(26, 26, 46, 0.9);
            border-radius: 10px;
            z-index: 10;
            text-align: center;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s;
            margin: 10px 5px;
            width: 200px;
        }

        .btn:active { transform: scale(0.95); }
        .btn-gold { background-color: #f1c40f; color: #333; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.4); }
    </style>
</head>
<body>
    
    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>🧱 벽돌 깨기</h1>
    </header>

    <div id="game-wrapper">
        <div id="game-header">
            <div class="header-group" style="align-items: flex-start;">
                <span>스테이지: <span id="stage-display" style="color: #f1c40f;">1</span></span>
                <span class="high-score-text">최고 점수: <span id="high-score">0</span></span>
            </div>
            <div class="header-group">
                <span>점수: <span id="score">0</span></span>
            </div>
            <div class="header-group" style="align-items: flex-end;">
                <span>보유 공: <span id="ball-count" style="color: #00d2d3;">30</span></span>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <button id="btn-recall" onclick="recallBalls()">⏬ 공 즉시 회수</button>
            
            <div id="start-screen" class="overlay-screen">
                <h2 style="margin-bottom: 20px; color: #fff;">스테이지 벽돌 깨기!</h2>
                <p style="color: #00d2d3; margin-bottom: 5px;">공 30개를 당구처럼 조준해서 쏘세요.</p>
                <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">(모든 벽돌을 부수면 다음 스테이지로 갑니다)</p>
                <button class="btn" onclick="startGame()">🎯 게임 시작</button>
            </div>

            <div id="next-stage-screen" class="overlay-screen" style="display: none;">
                <h2 style="color: #f1c40f; margin-bottom: 10px; font-size: 28px;">STAGE CLEAR!</h2>
                <p style="color: #ecf0f1; margin-bottom: 5px;">점수를 유지한 채 다음 스테이지로 이동합니다.</p>
                <p style="color: #e74c3c; font-weight: bold; font-size: 14px; margin-bottom: 20px;">벽돌의 체력이 더 단단해집니다!</p>
                <button class="btn btn-gold" onclick="nextStage()">다음 스테이지 도전</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const scoreDisplay = document.getElementById("score");
        const ballCountDisplay = document.getElementById("ball-count");
        const highScoreDisplay = document.getElementById("high-score");
        
        const startScreen = document.getElementById("start-screen");
        const nextStageScreen = document.getElementById("next-stage-screen");
        const btnRecall = document.getElementById("btn-recall");

        let stageHighScore = localStorage.getItem('brickStageHighScore') || 0;
        highScoreDisplay.innerText = stageHighScore;

        let animationId;
        let gameState = 'ready'; 
        let score = 0;
        let stage = 1;

        let paddleHeight = 15;
        let paddleWidth = 80; 
        let paddleX = 0; 
        let nextLaunchX = null; // 💡 다음 턴에 쏠 X 좌표 (공이 모이는 곳)
        
        let totalBalls = 30;
        let ballsToFire = 0;
        let fireTimer = 0;
        let activeBalls = [];
        let ballRadius = 6;
        
        // 💡 속도 2배 상향 적용
        let baseSpeed = 24.0; 

        let isAiming = false;
        let aimVector = { dx: 0, dy: 0 };
        let mousePos = { x: 0, y: 0 };

        let brickColumnCount = 7;
        let brickRowCount = 8; 
        let brickPadding = 6;
        let brickOffsetTop = 60; 
        let brickHeight = 35; 
        let grid = []; 

        const hpColors = ["#4cd137", "#00a8ff", "#9c88ff", "#fbc531", "#e84118", "#e1b12c", "#c23616", "#2f3640", "#ff0000", "#000000"];

        function resizeCanvas() {
            const container = document.getElementById("canvas-container");
            const headerObj = document.querySelector("header");
            const gameHeaderObj = document.getElementById("game-header");
            
            let availableHeight = window.innerHeight - headerObj.offsetHeight - gameHeaderObj.offsetHeight - 30;
            canvas.width = container.clientWidth - 20; 
            canvas.height = availableHeight;
            
            paddleX = (canvas.width - paddleWidth) / 2;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initGrid() {
            grid = [];
            let maxHp = stage * 5; 

            for (let r = 0; r < brickRowCount; r++) {
                let row = [];
                let brickWidth = (canvas.width - (brickPadding * (brickColumnCount + 1))) / brickColumnCount;
                
                for (let c = 0; c < brickColumnCount; c++) {
                    let rand = Math.random();
                    if (rand < 0.15) {
                        row.push({ status: 0, hp: 0, w: brickWidth, h: brickHeight });
                    } else {
                        let randomHp = Math.floor(Math.random() * maxHp) + 1;
                        row.push({ status: 1, hp: randomHp, w: brickWidth, h: brickHeight });
                    }
                }
                grid.push(row);
            }
        }

        function handlePointerDown(e) {
            if (gameState !== 'ready') return;
            isAiming = true;
            updateAim(e);
        }

        function handlePointerMove(e) {
            if (!isAiming) return;
            updateAim(e);
        }

        function handlePointerUp(e) {
            if (!isAiming) return;
            isAiming = false;
            
            if (aimVector.dy < 0) {
                gameState = 'shooting';
                ballsToFire = totalBalls;
                fireTimer = 0;
                nextLaunchX = null; // 발사할 때마다 초기화
                btnRecall.style.display = "block"; 
            }
        }

        function updateAim(e) {
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mousePos.x = (clientX - rect.left) * (canvas.width / rect.width);
            mousePos.y = (clientY - rect.top) * (canvas.height / rect.height);

            let startX = paddleX + paddleWidth / 2;
            let startY = canvas.height - paddleHeight - ballRadius;

            let dx = mousePos.x - startX;
            let dy = mousePos.y - startY;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dy > -10) dy = -10;

            aimVector.dx = (dx / dist) * baseSpeed;
            aimVector.dy = (dy / dist) * baseSpeed;
        }

        canvas.addEventListener("pointerdown", handlePointerDown);
        canvas.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", handlePointerUp);
        canvas.addEventListener("touchstart", (e) => e.preventDefault(), { passive: false });

        // 💡 모든 공을 즉시 바닥으로 강제 착륙시킴
        function recallBalls() {
            if (gameState === 'ready') return;
            
            for (let i = 0; i < activeBalls.length; i++) {
                if (!activeBalls[i].isLanded) {
                    activeBalls[i].y = canvas.height - paddleHeight - 15;
                    activeBalls[i].isLanded = true;
                    if (nextLaunchX === null) nextLaunchX = activeBalls[i].x;
                }
            }
            ballsToFire = 0;
            btnRecall.style.display = "none";
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight, 5);
            ctx.fillStyle = "#e94560";
            ctx.fill();
            ctx.closePath();
        }

        // 💡 조준선 반사 시뮬레이션 및 길이 대폭 연장
        function drawAimLine() {
            if (isAiming && aimVector.dy < 0) {
                let sX = paddleX + paddleWidth / 2;
                let sY = canvas.height - paddleHeight - 15;

                ctx.beginPath();
                ctx.setLineDash([8, 8]);
                ctx.moveTo(sX, sY);

                let cX = sX;
                let cY = sY;
                let vX = aimVector.dx;
                let vY = aimVector.dy;
                let remainingDist = 2000; // 💡 궤적 길이 대폭 연장
                
                while(remainingDist > 0) {
                    let tX = vX > 0 ? (canvas.width - ballRadius - cX) / vX : (ballRadius - cX) / vX;
                    let tY = vY < 0 ? (ballRadius - cY) / vY : Infinity; 
                    
                    if (tX < 0) tX = Infinity;
                    if (tY < 0) tY = Infinity;
                    
                    let t = Math.min(tX, tY);
                    let distToWall = t * Math.sqrt(vX*vX + vY*vY);
                    
                    if (distToWall < remainingDist) {
                        cX += vX * t;
                        cY += vY * t;
                        ctx.lineTo(cX, cY);
                        remainingDist -= distToWall;
                        
                        if (t === tX) vX = -vX;
                        else if (t === tY) vY = -vY;
                    } else {
                        let ratio = remainingDist / Math.sqrt(vX*vX + vY*vY);
                        cX += vX * ratio;
                        cY += vY * ratio;
                        ctx.lineTo(cX, cY);
                        remainingDist = 0;
                    }
                }

                ctx.strokeStyle = "rgba(0, 210, 211, 0.8)";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.closePath();
            }
        }

        function drawBricks() {
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    let b = grid[r][c];
                    if (b.status === 1) {
                        let brickX = (c * (b.w + brickPadding)) + brickPadding;
                        let brickY = (r * (b.h + brickPadding)) + brickOffsetTop;
                        b.x = brickX;
                        b.y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, b.w, b.h, 4);
                        ctx.fillStyle = hpColors[(b.hp - 1) % hpColors.length];
                        ctx.fill();
                        
                        ctx.fillStyle = "#fff";
                        ctx.font = "bold 15px Arial";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(b.hp, brickX + b.w / 2, brickY + b.h / 2);
                        ctx.closePath();
                    }
                }
            }
        }

        // 💡 대기 중인 공(장전된 공)과 날아다니는 공 렌더링
        function drawBalls() {
            ctx.shadowColor = "rgba(0, 210, 211, 0.5)";
            ctx.shadowBlur = 5;
            ctx.fillStyle = "#00d2d3";

            // 필드 위의 공 렌더링
            activeBalls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            });
            ctx.shadowBlur = 0; 

            // 장전 대기 중인 공을 중앙(또는 모인 지점)에 그리기
            if (gameState === 'ready' || ballsToFire > 0) {
                let waitX = paddleX + paddleWidth / 2;
                let waitY = canvas.height - paddleHeight - 15;
                
                ctx.beginPath();
                ctx.arc(waitX, waitY, ballRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
                
                // 공 위에 남은 갯수 텍스트 표시
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText("x" + (gameState === 'ready' ? totalBalls : ballsToFire), waitX, waitY - 15);
            }
        }

        let lastTime = 0;
        function update(currentTime) {
            if (!lastTime) lastTime = currentTime;
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            let timeScale = deltaTime / (1000 / 60);
            if (timeScale > 3) timeScale = 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 💡 발사 로직
            if (gameState === 'shooting' && ballsToFire > 0) {
                fireTimer += timeScale;
                if (fireTimer > 3) { 
                    let startX = paddleX + paddleWidth / 2;
                    let startY = canvas.height - paddleHeight - 15;
                    activeBalls.push({ x: startX, y: startY, dx: aimVector.dx, dy: aimVector.dy, isLanded: false });
                    ballsToFire--;
                    ballCountDisplay.innerText = ballsToFire;
                    fireTimer = 0;
                }
            } else if (gameState === 'shooting' && ballsToFire === 0) {
                gameState = 'playing'; 
            }

            // 💡 고속 물리 계산 (터널링 방지를 위해 프레임을 2번 쪼개서 계산)
            let movingBallsCount = 0;
            
            for (let step = 0; step < 2; step++) {
                let subTimeScale = timeScale / 2;

                for (let i = 0; i < activeBalls.length; i++) {
                    let ball = activeBalls[i];

                    // 💡 바닥에 닿은 공들을 다음 턴 발사 지점(nextLaunchX)으로 부드럽게 모으기
                    if (ball.isLanded) {
                        if (step === 0) { 
                            if (Math.abs(ball.x - nextLaunchX) > 5) {
                                ball.x += (nextLaunchX > ball.x ? 1 : -1) * 20 * subTimeScale;
                            } else {
                                ball.x = nextLaunchX;
                            }
                        }
                        continue;
                    }

                    if (step === 0) movingBallsCount++;

                    ball.x += ball.dx * subTimeScale;
                    ball.y += ball.dy * subTimeScale;

                    // 좌우 벽
                    if (ball.x < ballRadius) { ball.x = ballRadius; ball.dx = -ball.dx; }
                    if (ball.x > canvas.width - ballRadius) { ball.x = canvas.width - ballRadius; ball.dx = -ball.dx; }
                    
                    // 천장
                    if (ball.y < ballRadius) { ball.y = ballRadius; ball.dy = -ball.dy; }
                    
                    // 💡 바닥 충돌 시 사라지지 않고 착륙 상태(isLanded)로 전환
                    let groundY = canvas.height - paddleHeight - 15;
                    if (ball.y >= groundY) {
                        ball.y = groundY;
                        ball.isLanded = true;
                        // 첫 번째로 닿은 공이 다음 턴의 위치 기준이 됨
                        if (nextLaunchX === null) nextLaunchX = ball.x;
                    }

                    // 벽돌 충돌 로직
                    if (!ball.isLanded) {
                        for (let r = 0; r < grid.length; r++) {
                            for (let c = 0; c < brickColumnCount; c++) {
                                let b = grid[r][c];
                                if (b.status === 1) {
                                    if (ball.x + ballRadius > b.x && ball.x - ballRadius < b.x + b.w && 
                                        ball.y + ballRadius > b.y && ball.y - ballRadius < b.y + b.h) {
                                        
                                        let overlapLeft = (ball.x + ballRadius) - b.x;
                                        let overlapRight = (b.x + b.w) - (ball.x - ballRadius);
                                        let overlapTop = (ball.y + ballRadius) - b.y;
                                        let overlapBottom = (b.y + b.h) - (ball.y - ballRadius);

                                        let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                                        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                                            ball.dx = -ball.dx; 
                                        } else {
                                            ball.dy = -ball.dy; 
                                        }
                                        
                                        b.hp -= 1; 
                                        score += 2; 
                                        if (b.hp <= 0) { b.status = 0; score += 10; }
                                    }
                                }
                            }
                        }
                    }
                }
            }

            drawBricks();
            drawPaddle();
            drawBalls();
            drawAimLine();

            scoreDisplay.innerText = score;

            // 💡 모든 공이 발사되었고 착륙했으며, 모이기가 완료되면 턴 재장전
            if (gameState === 'playing' && ballsToFire === 0 && movingBallsCount === 0) {
                let allGathered = activeBalls.every(b => Math.abs(b.x - nextLaunchX) <= 5);
                if (allGathered) {
                    gameState = 'ready';
                    btnRecall.style.display = "none";
                    ballCountDisplay.innerText = totalBalls;
                    
                    // 패들을 모인 위치로 순간이동 (다음 조준/발사 기준점)
                    paddleX = nextLaunchX - paddleWidth / 2;
                    if (paddleX < 0) paddleX = 0;
                    if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;

                    activeBalls = []; 
                    nextLaunchX = null;
                }
            }

            let bricksLeft = false;
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    if (grid[r][c].status === 1) bricksLeft = true;
                }
            }

            if (!bricksLeft && gameState === 'ready') {
                gameState = 'cleared';
                btnRecall.style.display = "none";
                nextStageScreen.style.display = "flex";
                
                if (score > stageHighScore) {
                    stageHighScore = score;
                    localStorage.setItem('brickStageHighScore', stageHighScore);
                    highScoreDisplay.innerText = stageHighScore;
                }
                return; 
            }

            if (gameState !== 'cleared') {
                animationId = requestAnimationFrame(update);
            }
        }

        function startGame() {
            startScreen.style.display = "none";
            nextStageScreen.style.display = "none";
            btnRecall.style.display = "none";
            
            resizeCanvas();
            
            stage = 1;
            score = 0;
            gameState = 'ready';
            activeBalls = [];
            ballsToFire = 0;
            nextLaunchX = null;
            
            document.getElementById("stage-display").innerText = stage;
            ballCountDisplay.innerText = totalBalls;
            
            initGrid();
            
            lastTime = 0; 
            cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(update);
        }

        function nextStage() {
            nextStageScreen.style.display = "none";
            stage += 1;
            document.getElementById("stage-display").innerText = stage;
            
            gameState = 'ready';
            activeBalls = [];
            ballsToFire = 0;
            nextLaunchX = null;
            ballCountDisplay.innerText = totalBalls;
            
            initGrid(); 
            
            lastTime = 0;
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>
