<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>벽돌 깨기 (스테이지 & 무한 모드)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: bold;
        }

        #game-header span { display: inline-block; }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: #16213e;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            border: 2px solid #0f3460;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(26, 26, 46, 0.85);
            border-radius: 5px;
            z-index: 10;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s;
            margin: 10px 5px;
            width: 200px;
        }

        .btn-purple {
            background-color: #9b59b6;
            box-shadow: 0 4px 10px rgba(155, 89, 182, 0.4);
        }

        .btn:active { transform: scale(0.95); }
        .btn-gold { background-color: #f1c40f; color: #333; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.4); }
        
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            text-decoration: none;
            background: #0f3460;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    
    <a href="index.html" class="back-btn">◀ 메인으로</a>

    <div id="game-header">
        <span id="header-mode-info">스테이지: <span id="stage-display" style="color: #f1c40f;">1</span></span>
        <span>점수: <span id="score">0</span></span>
        <span>공 개수: <span id="ball-count">1</span></span>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="start-screen" class="overlay-screen">
            <h2 id="message" style="margin-bottom: 20px; text-align: center;">멀티볼 벽돌 깨기!</h2>
            <button class="btn" onclick="startGame('stage')">🎯 스테이지 모드</button>
            <button class="btn btn-purple" onclick="startGame('infinite')">🔥 무한 생존 모드</button>
        </div>

        <div id="next-stage-screen" class="overlay-screen" style="display: none;">
            <h2 style="color: #f1c40f; margin-bottom: 10px; font-size: 28px;">STAGE CLEAR!</h2>
            <p style="color: #ecf0f1; margin-bottom: 5px;">점수를 유지한 채 다음 스테이지로 이동합니다.</p>
            <p style="color: #e74c3c; font-weight: bold; font-size: 14px;">주의: 벽돌의 최대 체력이 5 증가합니다!</p>
            <button class="btn btn-gold" onclick="nextStage()">다음 스테이지 도전</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const ballCountDisplay = document.getElementById("ball-count");
        const headerModeInfo = document.getElementById("header-mode-info");
        
        const startScreen = document.getElementById("start-screen");
        const nextStageScreen = document.getElementById("next-stage-screen");
        const messageDisplay = document.getElementById("message");

        let animationId;
        let isPlaying = false;
        let score = 0;
        let gameMode = 'stage'; 
        
        let stage = 1;

        let lastDropTime = 0;
        const dropInterval = 5000; 
        let linesDropped = 0;
        let currentMaxHp = 5;

        function resizeCanvas() {
            const containerWidth = document.getElementById("canvas-container").clientWidth;
            canvas.width = containerWidth > 600 ? 600 : containerWidth;
            canvas.height = window.innerHeight - 100;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let paddleHeight = 15;
        let paddleWidth = canvas.width / 4;
        let paddleX = (canvas.width - paddleWidth) / 2;
        
        let ballRadius = 8;
        let balls = []; 
        let baseSpeed = 4.0; 

        let brickColumnCount = 7;
        let brickRowCount = 8; 
        let brickPadding = 6;
        let brickOffsetTop = 60; 
        let brickHeight = 35; 
        let grid = []; 

        const hpColors = ["#4cd137", "#00a8ff", "#9c88ff", "#fbc531", "#e84118", "#e1b12c", "#c23616", "#2f3640", "#ff0000", "#000000"];

        function createRow(maxHp) {
            let row = [];
            let brickWidth = (canvas.width - (brickPadding * (brickColumnCount + 1))) / brickColumnCount;
            
            for (let c = 0; c < brickColumnCount; c++) {
                const rand = Math.random();
                if (rand < 0.15) {
                    row.push({ status: 0, hp: 0, isItem: false, w: brickWidth, h: brickHeight });
                } 
                // [밸런스 패치] 아이템 등장 확률을 10%에서 7%로 하향 (0.9 -> 0.93)
                else if (rand > 0.93) {
                    row.push({ status: 1, hp: 1, isItem: true, w: brickWidth, h: brickHeight });
                } else {
                    let randomHp = Math.floor(Math.random() * maxHp) + 1;
                    row.push({ status: 1, hp: randomHp, isItem: false, w: brickWidth, h: brickHeight });
                }
            }
            return row;
        }

        function initStageGrid() {
            grid = [];
            let maxHp = stage * 5;
            for (let r = 0; r < brickRowCount; r++) {
                grid.push(createRow(maxHp));
            }
        }

        function initInfiniteGrid() {
            grid = [];
            for (let i = 0; i < 4; i++) {
                grid.push(createRow(currentMaxHp));
            }
        }

        function dropBricks() {
            grid.unshift(createRow(currentMaxHp));
            linesDropped++;
            
            currentMaxHp = Math.min(5 + Math.floor(linesDropped / 2), 30);
            document.getElementById("max-hp-display").innerText = currentMaxHp;

            for (let r = 0; r < grid.length; r++) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                if (brickY + brickHeight > canvas.height - paddleHeight - 20) {
                    for (let c = 0; c < brickColumnCount; c++) {
                        if (grid[r][c].status === 1) {
                            gameOver(); 
                            return;
                        }
                    }
                }
            }
        }

        function createBall(x, y, dx, dy) {
            balls.push({ x: x, y: y, dx: dx, dy: dy });
        }

        function fireMultiBalls() {
            // [밸런스 패치] 10개 발사에서 5개 발사로 하향
            const extraBalls = 5;
            for (let i = 0; i < extraBalls; i++) {
                // 5개에 맞춰 부채꼴 각도 조절
                let angleDeg = 30 + (120 / extraBalls) * i; 
                let angleRad = angleDeg * Math.PI / 180;
                
                let startX = paddleX + paddleWidth / 2;
                let startY = canvas.height - paddleHeight - ballRadius - 5;
                
                let dx = Math.cos(angleRad) * baseSpeed;
                let dy = -Math.sin(angleRad) * baseSpeed;
                
                createBall(startX, startY, dx, dy);
            }
            if (balls.length > 100) balls.splice(100);
        }

        function movePaddle(e) {
            let clientX;
            if (e.touches) clientX = e.touches[0].clientX;
            else clientX = e.clientX;
            
            let relativeX = clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
            
            if (paddleX < 0) paddleX = 0;
            if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
        }

        document.addEventListener("mousemove", movePaddle);
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); movePaddle(e); }, { passive: false });

        function drawTimerBar() {
            let elapsed = Date.now() - lastDropTime;
            let ratio = elapsed / dropInterval;
            if (ratio > 1) ratio = 1;
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(0, 0, canvas.width * ratio, 6);
        }

        function drawBalls() {
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = "#00d2d3";
                ctx.shadowColor = "rgba(0, 210, 211, 0.5)";
                ctx.shadowBlur = 5;
                ctx.fill();
                ctx.shadowBlur = 0; 
                ctx.closePath();
            });
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.fillStyle = "#e94560";
            ctx.fill();
            ctx.strokeStyle = "#ff7675";
            ctx.lineWidth = 2;
            ctx.strokeRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.closePath();
        }

        function drawBricks() {
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    let b = grid[r][c];
                    if (b.status === 1) {
                        let brickX = (c * (b.w + brickPadding)) + brickPadding;
                        let brickY = (r * (b.h + brickPadding)) + brickOffsetTop;
                        b.x = brickX;
                        b.y = brickY;
                        
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, b.w, b.h);
                        
                        ctx.font = "bold 14px Arial";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";

                        if (b.isItem) {
                            ctx.fillStyle = "#f1c40f"; 
                            ctx.fill();
                            ctx.fillStyle = "#000";
                            // [밸런스 패치] 블록 표시 텍스트를 +5로 변경
                            ctx.fillText("+5", brickX + b.w / 2, brickY + b.h / 2);
                        } else {
                            ctx.fillStyle = hpColors[(b.hp - 1) % hpColors.length];
                            ctx.fill();
                            ctx.fillStyle = "#fff";
                            ctx.fillText(b.hp, brickX + b.w / 2, brickY + b.h / 2);
                        }
                        ctx.closePath();
                    }
                }
            }
        }

        function collisionDetection() {
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    let b = grid[r][c];
                    if (b.status === 1) {
                        for (let i = 0; i < balls.length; i++) {
                            let ball = balls[i];
                            if (ball.x + ballRadius > b.x && ball.x - ballRadius < b.x + b.w && 
                                ball.y + ballRadius > b.y && ball.y - ballRadius < b.y + b.h) {
                                
                                let overlapLeft = (ball.x + ballRadius) - b.x;
                                let overlapRight = (b.x + b.w) - (ball.x - ballRadius);
                                let overlapTop = (ball.y + ballRadius) - b.y;
                                let overlapBottom = (b.y + b.h) - (ball.y - ballRadius);

                                let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                                if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                                    ball.dx = -ball.dx; 
                                } else {
                                    ball.dy = -ball.dy; 
                                }
                                
                                b.hp -= 1; 
                                score += 2; 

                                if (b.hp <= 0) {
                                    b.status = 0; 
                                    score += 10; 
                                    if (b.isItem) fireMultiBalls();
                                }
                                break; 
                            }
                        }
                    }
                }
            }
        }

        function draw() {
            if (!isPlaying) return;

            if (gameMode === 'infinite') {
                if (Date.now() - lastDropTime > dropInterval) {
                    dropBricks();
                    lastDropTime = Date.now();
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameMode === 'infinite') drawTimerBar(); 
            
            drawBricks();
            drawBalls();
            drawPaddle();
            collisionDetection();

            scoreDisplay.innerText = score;
            ballCountDisplay.innerText = balls.length;

            let activeBalls = [];

            for (let i = 0; i < balls.length; i++) {
                let ball = balls[i];

                if (ball.x + ball.dx > canvas.width - ballRadius || ball.x + ball.dx < ballRadius) {
                    ball.dx = -ball.dx;
                }
                if (ball.y + ball.dy < ballRadius) {
                    ball.dy = -ball.dy;
                }
                
                if (ball.y + ball.dy > canvas.height - paddleHeight - ballRadius - 10) {
                    if (ball.x > paddleX - ballRadius && ball.x < paddleX + paddleWidth + ballRadius) {
                        let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                        let normalizedHit = hitPoint / (paddleWidth / 2);
                        let maxAngle = 60 * Math.PI / 180;
                        let bounceAngle = normalizedHit * maxAngle;
                        
                        ball.dx = Math.sin(bounceAngle) * baseSpeed;
                        ball.dy = -Math.cos(bounceAngle) * baseSpeed;
                        
                    } else if (ball.y + ball.dy > canvas.height) {
                        continue; 
                    }
                }

                ball.x += ball.dx;
                ball.y += ball.dy;
                activeBalls.push(ball); 
            }

            balls = activeBalls; 

            let bricksLeft = false;
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < brickColumnCount; c++) {
                    if (grid[r][c].status === 1) bricksLeft = true;
                }
            }

            if (!bricksLeft) {
                if (gameMode === 'stage') {
                    isPlaying = false;
                    nextStageScreen.style.display = "flex";
                    return; 
                } else if (gameMode === 'infinite') {
                    score += 100; 
                    dropBricks(); 
                    lastDropTime = Date.now();
                }
            }

            if (balls.length === 0) {
                gameOver();
                return;
            }

            animationId = requestAnimationFrame(draw);
        }

        function startGame(selectedMode) {
            gameMode = selectedMode;
            startScreen.style.display = "none";
            nextStageScreen.style.display = "none";
            
            paddleWidth = canvas.width / 4;
            paddleX = (canvas.width - paddleWidth) / 2;
            score = 0;
            balls = [];
            createBall(canvas.width / 2, canvas.height - 40, (Math.random() > 0.5 ? 1 : -1) * baseSpeed, -baseSpeed);
            
            if (gameMode === 'stage') {
                stage = 1;
                brickOffsetTop = 60;
                headerModeInfo.innerHTML = '스테이지: <span id="stage-display" style="color: #f1c40f;">1</span>';
                initStageGrid();
            } else {
                linesDropped = 0;
                currentMaxHp = 5;
                brickOffsetTop = 30;
                headerModeInfo.innerHTML = '최대 체력: <span id="max-hp-display" style="color: #e74c3c;">5</span>';
                initInfiniteGrid();
                lastDropTime = Date.now();
            }
            
            isPlaying = true;
            draw();
        }

        function nextStage() {
            nextStageScreen.style.display = "none";
            stage += 1;
            document.getElementById("stage-display").innerText = stage;
            
            paddleWidth = canvas.width / 4;
            paddleX = (canvas.width - paddleWidth) / 2;
            
            initStageGrid(); 
            
            balls = [];
            createBall(paddleX + paddleWidth / 2, canvas.height - 40, (Math.random() > 0.5 ? 1 : -1) * baseSpeed, -baseSpeed);
            
            isPlaying = true;
            draw();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            startScreen.style.display = "flex";
            messageDisplay.innerHTML = `게임 오버!<br><br>최종 점수: <span style="color:#f1c40f;">${score}</span> 점`;
        }
    </script>
</body>
</html>
