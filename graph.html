<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>그래프 계산기</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }
        .btn-main-go:active { transform: translateY(4px); box-shadow: 0 0 0 #27ae60; }

        h1 {
            color: #0fb9b1;
            margin: 0;
            font-size: 24px; 
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(15, 185, 177, 0.4);
        }

        .container {
            width: 100%;
            flex-grow: 1; 
            background-color: #2c3e50;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: row; 
            gap: 15px;
            overflow: hidden; 
        }

        .sidebar {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 15px;
            box-sizing: border-box;
            height: 100%;
            overflow: hidden; 
        }

        .formula-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .formula-list::-webkit-scrollbar { width: 6px; }
        .formula-list::-webkit-scrollbar-thumb { background: #0fb9b1; border-radius: 3px; }

        .formula-row {
            display: flex;
            align-items: center;
            background: #1e272e;
            border-radius: 10px;
            padding: 12px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .formula-row.error { border-color: #e74c3c; }

        .color-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        input.formula-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        input.formula-input::placeholder { color: #808e9b; font-weight: normal; }

        .btn-remove {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 20px;
            cursor: pointer;
            margin-left: 8px;
        }

        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
            border-top: 1px solid #34495e;
            padding-top: 12px;
        }

        .btn-add {
            background-color: #34495e;
            color: #0fb9b1;
            border: 2px dashed #0fb9b1;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover { background-color: #0fb9b1; color: #fff; }

        .chart-container {
            position: relative;
            flex-grow: 1; 
            height: 100%;
            background-color: #16213e;
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 10px; gap: 10px; }
            .sidebar { width: 100%; flex: 0 0 45%; max-height: 45%; padding: 12px; }
            .chart-container { width: 100%; flex: 1; height: auto; }
            h1 { font-size: 20px; }
            .btn-main-go { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>📈 그래프 계산기</h1>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="formula-list" id="formula-list"></div>
            <div class="controls-row">
                <button class="btn-add" onclick="addFormulaRow('')">➕ 방정식 추가</button>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("graphCanvas");
        const ctx = canvas.getContext("2d");

        // 💡 핵심: 캔버스의 중심 좌표(x, y)와 배율(pxPerUnit)을 통해 1:1 완벽 비율 유지
        let camera = {
            x: 0, 
            y: 0, 
            pxPerUnit: 50 // 수학 단위 1당 50픽셀 (배율)
        };

        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        
        let initialPinchDist = 0;
        let initialScale = 0;
        let initialPinchMathCenter = null;

        const colorPalette = [ '#0fb9b1', '#f1c40f', '#ff7675', '#a29bfe', '#55efc4', '#ffeaa7', '#fab1a0' ];
        let formulaCount = 0;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            
            drawGraph();
        }
        window.addEventListener('resize', resizeCanvas);

        function addFormulaRow(initialValue = '') {
            const list = document.getElementById('formula-list');
            const color = colorPalette[formulaCount % colorPalette.length];
            const row = document.createElement('div');
            row.className = 'formula-row';
            
            row.innerHTML = `
                <div class="color-dot" style="background-color: ${color}; color: ${color};"></div>
                <input type="text" class="formula-input" value="${initialValue}" placeholder="수식 입력 (예: x^2 + y^2 = 9)" oninput="debouncedDraw()">
                <button class="btn-remove" onclick="removeFormulaRow(this)">✕</button>
            `;
            
            list.appendChild(row);
            formulaCount++;
            list.scrollTop = list.scrollHeight;
            drawGraph();
        }

        function removeFormulaRow(btnElement) {
            btnElement.parentElement.remove();
            drawGraph();
        }

        // 💡 초고속 순수 JS 파서 엔진: 수식을 JS 네이티브 함수로 컴파일
        function compileToFastFunction(raw) {
            let s = raw.toLowerCase().replace(/\s+/g, '');
            
            // 2x, 2sin -> 2*x, 2*sin 변환
            s = s.replace(/(\d)([a-z])/g, '$1*$2');
            // xy -> x*y 변환
            s = s.replace(/(x)(y)/g, '$1*$2').replace(/(y)(x)/g, '$1*$2');
            s = s.replace(/(x|y|\d)(\()/g, '$1*$2');
            s = s.replace(/(\))(x|y|\d|[a-z])/g, '$1*$2');

            // 방정식(=)을 이항 처리
            if (s.includes('=')) {
                let parts = s.split('=');
                s = `(${parts[0]}) - (${parts[1]})`;
            } else if (!s.includes('y') && s.includes('x')) {
                s = `y - (${s})`;
            } else if (!s.includes('x') && s.includes('y')) {
                s = `x - (${s})`;
            }

            const mathFuncs = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'abs', 'sqrt', 'log', 'exp'];
            mathFuncs.forEach(func => {
                let re = new RegExp(func, 'g');
                s = s.replace(re, `Math.${func}`);
            });
            s = s.replace(/pi/g, 'Math.PI').replace(/\be\b/g, 'Math.E');
            s = s.replace(/\^/g, '**');

            try {
                let fn = new Function('x', 'y', `return ${s};`);
                fn(1, 1); // 문법 오류 테스트
                return fn;
            } catch(e) {
                throw e;
            }
        }

        let debounceTimer;
        function debouncedDraw() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(drawGraph, 50);
        }

        // 좌표 변환 헬퍼 함수
        const getRect = () => canvas.getBoundingClientRect();
        const toMathX = (px) => (px - getRect().width/2) / camera.pxPerUnit + camera.x;
        const toMathY = (py) => camera.y - (py - getRect().height/2) / camera.pxPerUnit;
        const toScreenX = (mx) => (mx - camera.x) * camera.pxPerUnit + getRect().width/2;
        const toScreenY = (my) => getRect().height/2 - (my - camera.y) * camera.pxPerUnit;

        // 💡 PC 휠 줌 (마우스 커서 방향을 향해 줌인)
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = getRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const mathX = toMathX(mouseX);
            const mathY = toMathY(mouseY);

            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1; 
            camera.pxPerUnit *= zoomFactor;
            
            if (camera.pxPerUnit < 1) camera.pxPerUnit = 1;
            if (camera.pxPerUnit > 5000) camera.pxPerUnit = 5000;

            camera.x = mathX - (mouseX - rect.width/2) / camera.pxPerUnit;
            camera.y = mathY + (mouseY - rect.height/2) / camera.pxPerUnit;

            drawGraph();
        }, { passive: false });

        // 💡 모바일 핀치 줌 & 공통 드래그 (Pan)
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                isDragging = false;
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDist = Math.sqrt(dx*dx + dy*dy);
                initialScale = camera.pxPerUnit;
                
                const rect = getRect();
                let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                let cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                initialPinchMathCenter = { x: toMathX(cx), y: toMathY(cy) };
            } else if (e.touches.length === 1) {
                isDragging = true;
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = getRect();
            if (e.touches.length === 2 && initialPinchDist > 0) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                camera.pxPerUnit = initialScale * (dist / initialPinchDist);
                if (camera.pxPerUnit < 1) camera.pxPerUnit = 1;
                if (camera.pxPerUnit > 5000) camera.pxPerUnit = 5000;

                let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                let cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

                camera.x = initialPinchMathCenter.x - (cx - rect.width/2) / camera.pxPerUnit;
                camera.y = initialPinchMathCenter.y + (cy - rect.height/2) / camera.pxPerUnit;

                drawGraph();
            } else if (e.touches.length === 1 && isDragging) {
                let dx = e.touches[0].clientX - lastMouse.x;
                let dy = e.touches[0].clientY - lastMouse.y;
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };

                camera.x -= dx / camera.pxPerUnit;
                camera.y += dy / camera.pxPerUnit;
                drawGraph();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            if (e.touches.length < 2) initialPinchDist = 0;
            if (e.touches.length === 0) isDragging = false;
        });

        canvas.addEventListener('pointerdown', e => {
            if (e.pointerType !== 'touch') {
                isDragging = true;
                lastMouse = { x: e.clientX, y: e.clientY };
                canvas.setPointerCapture(e.pointerId);
            }
        });
        canvas.addEventListener('pointermove', e => {
            if (e.pointerType !== 'touch' && isDragging) {
                let dx = e.clientX - lastMouse.x;
                let dy = e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };

                camera.x -= dx / camera.pxPerUnit;
                camera.y += dy / camera.pxPerUnit;
                drawGraph();
            }
        });
        canvas.addEventListener('pointerup', e => { if(e.pointerType !== 'touch') { isDragging = false; canvas.releasePointerCapture(e.pointerId); }});
        canvas.addEventListener('pointercancel', e => isDragging = false);

        // 그리드 렌더링
        function drawGrid(rect) {
            const xRange = rect.width / camera.pxPerUnit;
            const yRange = rect.height / camera.pxPerUnit;

            const getStep = (range) => {
                let r = range / 6; 
                let p = Math.floor(Math.log10(r));
                let f = r / Math.pow(10, p);
                let step = f < 2 ? 1 : (f < 5 ? 2 : 5);
                return step * Math.pow(10, p);
            };

            const step = getStep(Math.max(xRange, yRange)); 

            ctx.lineWidth = 1;
            ctx.font = "12px 'Segoe UI', sans-serif";
            ctx.fillStyle = "#808e9b";

            let startX = Math.floor((camera.x - xRange/2) / step) * step;
            let endX = camera.x + xRange/2;
            
            for (let x = startX; x <= endX; x += step) {
                let px = toScreenX(x);
                ctx.strokeStyle = Math.abs(x) < 1e-10 ? "#7f8c8d" : "rgba(255,255,255,0.05)";
                ctx.lineWidth = Math.abs(x) < 1e-10 ? 2 : 1;
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, rect.height); ctx.stroke();
                
                if (Math.abs(x) > 1e-10) {
                    ctx.textAlign = "center";
                    ctx.fillText(parseFloat(x.toPrecision(4)), px, toScreenY(0) + 15);
                }
            }

            let startY = Math.floor((camera.y - yRange/2) / step) * step;
            let endY = camera.y + yRange/2;

            for (let y = startY; y <= endY; y += step) {
                let py = toScreenY(y);
                ctx.strokeStyle = Math.abs(y) < 1e-10 ? "#7f8c8d" : "rgba(255,255,255,0.05)";
                ctx.lineWidth = Math.abs(y) < 1e-10 ? 2 : 1;
                ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(rect.width, py); ctx.stroke();

                if (Math.abs(y) > 1e-10) {
                    ctx.textAlign = "right";
                    ctx.fillText(parseFloat(y.toPrecision(4)), toScreenX(0) - 8, py + 4);
                }
            }
        }

        // 💡 1:1 비율 고정 픽셀 기반 렌더링 엔진 (Marching Squares)
        function drawGraph() {
            const rect = getRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            drawGrid(rect);

            const rows = document.querySelectorAll('.formula-row');
            let legendY = 25; 

            rows.forEach((row) => {
                const inputElement = row.querySelector('.formula-input');
                let rawFormula = inputElement.value.trim();
                
                if (!rawFormula) {
                    row.classList.remove('error');
                    return; 
                }

                const color = row.querySelector('.color-dot').style.backgroundColor;

                try {
                    const fn = compileToFastFunction(rawFormula);
                    
                    // 해상도 조절 (픽셀 스텝 단위: 낮을수록 정밀하지만 무거움. 3~4가 적당)
                    const stepPx = 4; 
                    const cols = Math.ceil(rect.width / stepPx);
                    const rowsGrid = Math.ceil(rect.height / stepPx);
                    const values = new Float32Array((cols + 1) * (rowsGrid + 1));

                    let idx = 0;
                    for (let r = 0; r <= rowsGrid; r++) {
                        let mathY = toMathY(r * stepPx);
                        for (let c = 0; c <= cols; c++) {
                            let mathX = toMathX(c * stepPx);
                            try { values[idx++] = fn(mathX, mathY); } 
                            catch(e) { values[idx++] = NaN; }
                        }
                    }

                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.lineJoin = "round";

                    const interp = (v1, v2) => v1 / (v1 - v2);

                    for (let r = 0; r < rowsGrid; r++) {
                        for (let c = 0; c < cols; c++) {
                            let v00 = values[r * (cols + 1) + c];       // TL
                            let v10 = values[r * (cols + 1) + c + 1];   // TR
                            let v01 = values[(r + 1) * (cols + 1) + c]; // BL
                            let v11 = values[(r + 1) * (cols + 1) + c + 1]; // BR

                            if (isNaN(v00) || isNaN(v10) || isNaN(v01) || isNaN(v11)) continue;

                            let state = 0;
                            if (v00 >= 0) state |= 1;
                            if (v10 >= 0) state |= 2;
                            if (v11 >= 0) state |= 4;
                            if (v01 >= 0) state |= 8;

                            if (state === 0 || state === 15) continue;

                            let px0 = c * stepPx;
                            let py0 = r * stepPx;

                            let pT = [px0 + stepPx * interp(v00, v10), py0];
                            let pR = [px0 + stepPx, py0 + stepPx * interp(v10, v11)];
                            let pB = [px0 + stepPx * interp(v01, v11), py0 + stepPx];
                            let pL = [px0, py0 + stepPx * interp(v00, v01)];

                            let segments = [];
                            switch (state) {
                                case 1: case 14: segments.push([pL, pT]); break;
                                case 2: case 13: segments.push([pT, pR]); break;
                                case 4: case 11: segments.push([pR, pB]); break;
                                case 8: case 7: segments.push([pL, pB]); break;
                                case 3: case 12: segments.push([pL, pR]); break;
                                case 6: case 9: segments.push([pT, pB]); break;
                                case 5: segments.push([pL, pT], [pR, pB]); break;
                                case 10: segments.push([pT, pR], [pL, pB]); break;
                            }

                            for (let seg of segments) {
                                ctx.moveTo(seg[0][0], seg[0][1]);
                                ctx.lineTo(seg[1][0], seg[1][1]);
                            }
                        }
                    }
                    ctx.stroke();

                    // 방적식 오버레이 그리기
                    ctx.fillStyle = "rgba(30, 39, 46, 0.8)";
                    ctx.beginPath();
                    ctx.roundRect(rect.width - 220, legendY - 15, 200, 26, 6);
                    ctx.fill();

                    ctx.fillStyle = color;
                    ctx.beginPath(); ctx.arc(rect.width - 205, legendY - 2, 5, 0, Math.PI*2); ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 14px 'Courier New', monospace";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "middle";
                    
                    let displayFormula = rawFormula;
                    if(displayFormula.length > 18) displayFormula = displayFormula.substring(0, 16) + "...";
                    ctx.fillText(displayFormula, rect.width - 190, legendY);

                    legendY += 32; 
                    row.classList.remove('error'); 
                } catch (error) {
                    row.classList.add('error');
                }
            });
        }

        window.onload = () => {
            resizeCanvas();
            // 기본값으로 하트를 그려둡니다 (수식을 변경해보세요)
            addFormulaRow('(x^2 + y^2 - 1)^3 - x^2 * y^3 = 0'); 
        };
    </script>
</body>
</html>
