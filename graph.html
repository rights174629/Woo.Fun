<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>그래프 계산기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }

        .btn-main-go:hover { background: #27ae60; }
        .btn-main-go:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #27ae60;
        }

        h1 {
            color: #0fb9b1;
            margin: 0;
            font-size: 24px; 
            text-shadow: 0 4px 10px rgba(15, 185, 177, 0.4);
        }

        .container {
            width: 100%;
            flex-grow: 1; 
            background-color: #2c3e50;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: row; 
            gap: 20px;
            overflow: hidden; 
        }

        .sidebar {
            width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
            height: 100%;
            overflow: hidden; 
        }

        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .preset-btn {
            background-color: #34495e;
            color: #d2dae2;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .preset-btn:hover { background-color: #f1c40f; color: #000; }

        .formula-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
            min-height: 0; 
        }

        .formula-list::-webkit-scrollbar { width: 6px; }
        .formula-list::-webkit-scrollbar-thumb { background: #0fb9b1; border-radius: 3px; }

        .formula-row {
            display: flex;
            align-items: center;
            background: #1e272e;
            border-radius: 8px;
            padding: 10px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .formula-row.error { border-color: #e74c3c; }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .formula-row span.y-label {
            white-space: nowrap;
            font-size: 18px;
            font-weight: bold;
            color: #f1c40f;
            margin-right: 8px;
        }

        input.formula-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: monospace;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
            padding: 0 5px;
        }
        
        .btn-remove:hover { color: #ff7675; }

        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
            border-top: 1px solid #34495e;
            padding-top: 12px;
        }

        .btn-add {
            background-color: #34495e;
            color: #0fb9b1;
            border: 2px dashed #0fb9b1;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-add:hover { background-color: #0fb9b1; color: #fff; }

        .range-inputs {
            display: flex;
            gap: 10px;
        }

        .range-box {
            flex: 1;
            background: #1e272e;
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
        }
        
        .range-box label {
            color: #808e9b;
            margin-right: 8px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }

        .range-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            width: 100%;
            outline: none;
        }

        .zoom-group {
            display: flex;
            gap: 10px;
        }

        .btn-zoom {
            flex: 1;
            background: #2980b9;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-zoom:hover { background: #3498db; }
        .btn-zoom:active { transform: scale(0.95); }

        .chart-container {
            position: relative;
            flex-grow: 1; 
            height: 100%;
            background-color: #1e272e;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column; 
                padding: 10px;
                gap: 10px;
            }
            .sidebar {
                width: 100%;
                flex: 0 0 45%; 
                max-height: 45%;
                padding: 10px;
            }
            .chart-container {
                width: 100%;
                flex: 1; 
                height: auto;
                padding: 10px;
            }
            h1 { font-size: 20px; }
            .btn-main-go { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>📈 그래프 계산기</h1>
    </header>

    <div class="container">
        
        <div class="sidebar">
            <div class="presets">
                <span style="color: #808e9b; font-size: 13px; white-space: nowrap; font-weight: bold;">추천:</span>
                <button class="preset-btn" onclick="addFormulaRow('x^2')">포물선</button>
                <button class="preset-btn" onclick="addFormulaRow('sin(x)')">사인</button>
                <button class="preset-btn" onclick="addFormulaRow('2x + 3')">직선</button>
                <button class="preset-btn" onclick="addFormulaRow('x^3 - 4x')">3차</button>
            </div>

            <div class="formula-list" id="formula-list">
            </div>

            <div class="controls-row">
                <button class="btn-add" onclick="addFormulaRow('')">➕ 수식 추가</button>
                
                <div class="range-inputs">
                    <div class="range-box">
                        <label>X 최소</label>
                        <input type="number" id="xMin" value="-10" oninput="drawGraph()">
                    </div>
                    <div class="range-box">
                        <label>X 최대</label>
                        <input type="number" id="xMax" value="10" oninput="drawGraph()">
                    </div>
                </div>
                
                <div class="zoom-group">
                    <button class="btn-zoom" onclick="zoomGraph(0.5)">🔍 확대 (+)</button>
                    <button class="btn-zoom" onclick="zoomGraph(2.0)">🔍 축소 (-)</button>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;
        
        const colorPalette = [
            '#0fb9b1', '#f1c40f', '#e74c3c', '#9b59b6', '#2ecc71', '#3498db', '#e67e22'
        ];
        
        let formulaCount = 0;

        function addFormulaRow(initialValue = '') {
            const list = document.getElementById('formula-list');
            const color = colorPalette[formulaCount % colorPalette.length];
            
            const row = document.createElement('div');
            row.className = 'formula-row';
            
            row.innerHTML = `
                <div class="color-dot" style="background-color: ${color}; color: ${color};"></div>
                <span class="y-label">y = </span>
                <input type="text" class="formula-input" value="${initialValue}" placeholder="예: 2x, sin(x)" oninput="drawGraph()">
                <button class="btn-remove" onclick="removeFormulaRow(this)">✕</button>
            `;
            
            list.appendChild(row);
            formulaCount++;
            
            list.scrollTop = list.scrollHeight;
            drawGraph();
        }

        function removeFormulaRow(btnElement) {
            btnElement.parentElement.remove();
            drawGraph();
        }

        function smartParse(str) {
            return str.replace(/(\d)([a-zA-Z])/g, '$1*$2');
        }

        function zoomGraph(factor) {
            const minInput = document.getElementById('xMin');
            const maxInput = document.getElementById('xMax');
            
            let min = parseFloat(minInput.value);
            let max = parseFloat(maxInput.value);

            if (isNaN(min) || isNaN(max) || min >= max) return;

            let center = (min + max) / 2;
            let currentRange = max - min;
            
            let newRange = currentRange * factor;

            if (newRange < 0.1) newRange = 0.1;
            if (newRange > 10000) newRange = 10000;

            let newMin = center - (newRange / 2);
            let newMax = center + (newRange / 2);

            minInput.value = parseFloat(newMin.toFixed(2));
            maxInput.value = parseFloat(newMax.toFixed(2));

            drawGraph();
        }

        function drawGraph() {
            const xMin = parseFloat(document.getElementById('xMin').value);
            const xMax = parseFloat(document.getElementById('xMax').value);

            if (isNaN(xMin) || isNaN(xMax) || xMin >= xMax) return;

            const datasets = [];
            const rows = document.querySelectorAll('.formula-row');

            rows.forEach((row) => {
                const inputElement = row.querySelector('.formula-input');
                let rawFormula = inputElement.value.trim();
                
                if (!rawFormula) {
                    row.classList.remove('error');
                    return; 
                }

                const formula = smartParse(rawFormula);
                const color = row.querySelector('.color-dot').style.backgroundColor;

                try {
                    const compiledFormula = math.compile(formula);
                    const dataPoints = [];
                    // 💡 해상도를 높여서 확대해도 부드럽게 보이도록 점 개수 증가
                    const step = (xMax - xMin) / 500; 

                    for (let x = xMin; x <= xMax; x += step) {
                        let y = compiledFormula.evaluate({ x: x });
                        if (typeof y === 'number' && !isNaN(y)) {
                            dataPoints.push({ x: x, y: y });
                        }
                    }

                    datasets.push({
                        label: `y = ${rawFormula}`, 
                        data: dataPoints,
                        borderColor: color,
                        backgroundColor: color,
                        borderWidth: 2.5,
                        showLine: true, 
                        pointRadius: 0, 
                        tension: 0.1 
                    });
                    
                    row.classList.remove('error'); 

                } catch (error) {
                    row.classList.add('error');
                }
            });

            if (myChart) {
                myChart.destroy();
            }

            const ctx = document.getElementById('graphCanvas').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, 
                    animation: false, 
                    scales: {
                        x: { 
                            type: 'linear', 
                            position: 'center',
                            min: xMin, 
                            max: xMax,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#bdc3c7' }
                        },
                        // 💡 Y축에 min, max를 강제로 주입하여 X축과 함께 스케일링 되도록 수정!
                        y: { 
                            position: 'center',
                            min: xMin, // Y 최소값을 X 최소값과 맞춤
                            max: xMax, // Y 최대값을 X 최대값과 맞춤
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#bdc3c7' }
                        }
                    },
                    plugins: {
                        legend: { 
                            labels: { 
                                color: '#fff', 
                                font: { size: 13, family: 'monospace' },
                                usePointStyle: true,
                                boxWidth: 6
                            } 
                        },
                        tooltip: { enabled: false }
                    }
                }
            });
        }

        window.addEventListener('resize', () => {
            if (myChart) myChart.resize();
        });

        window.onload = () => {
            addFormulaRow('x^2');
            addFormulaRow('2x - 3');
        };
    </script>
</body>
</html>
