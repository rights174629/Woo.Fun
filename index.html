<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woo.Fun</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 42px;
            color: #f1c40f;
            margin: 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #808e9b;
            font-size: 16px;
            margin-top: 15px;
            font-weight: bold;
        }

        .game-grid {
            display: grid;
            /* 화면 크기에 맞춰 카드가 1줄 또는 2줄로 자동 배치됩니다 */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 900px;
            padding-bottom: 60px;
        }

        .game-card {
            background-color: #2c3e50;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            background-color: #34495e;
            border-color: #f1c40f;
        }

        .game-card:active {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
        }

        .card-icon {
            font-size: 65px;
            margin-bottom: 20px;
            /* 아이콘이 살짝 떠 있는 듯한 효과 */
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        .card-title {
            font-size: 24px;
            margin: 0 0 12px 0;
            color: #0fb9b1;
            font-weight: 800;
        }

        .card-desc {
            font-size: 15px;
            color: #d1d8e0;
            margin: 0;
            line-height: 1.5;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 미니 게임 천국</h1>
        <p class="subtitle">심심할 때 즐기는 가벼운 웹 게임 모음집</p>
    </header>

    <div class="game-grid">
        
        <a href="snake.html" class="game-card">
            <span class="card-icon">🐍</span>
            <h2 class="card-title">스네이크 게임</h2>
            <p class="card-desc">화면을 꽉 채우는 퍼펙트 클리어에 도전하세요!</p>
        </a>

        <a href="brick.html" class="game-card">
            <span class="card-icon">🧱</span>
            <h2 class="card-title">벽돌 깨기</h2>
            <p class="card-desc">스테이지 클리어부터 숨 막히는 무한 생존 모드까지!</p>
        </a>

        <a href="TrexRun.html" class="game-card">
            <span class="card-icon">🦖</span>
            <h2 class="card-title">티렉스 런</h2>
            <p class="card-desc">점프와 급강하를 활용해 선인장과 익룡을 피하며 끝없이 달리세요.</p>
        </a>

        <a href="poo.html" class="game-card">
            <span class="card-icon">💩</span>
            <h2 class="card-title">똥피하기 대작전</h2>
            <p class="card-desc">하늘에서 쏟아지는 똥과 무시무시한 파멸의 똥을 피해 살아남으세요!</p>
        </a>

    </div>

</body>
</html>
