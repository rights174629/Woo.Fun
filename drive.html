<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Three.js 드라이빙 기초</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        
        /* 💡 모바일 버튼 스타일 */
        .controls { position: absolute; bottom: 30px; display: flex; gap: 20px; z-index: 10; }
        #left-controls { left: 30px; }
        #right-controls { right: 30px; }
        
        .btn {
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 50%;
            color: white; font-weight: bold; font-size: 20px;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="left-controls" class="controls">
        <div class="btn" id="btn-a">A</div>
        <div class="btn" id="btn-d">D</div>
    </div>
    <div id="right-controls" class="controls">
        <div class="btn" id="btn-w">W</div>
        <div class="btn" id="btn-s">S</div>
    </div>
    
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. 바닥(도로)
        const road = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 1000), 
            new THREE.MeshBasicMaterial({ color: 0x444444 })
        );
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // 💡 2. 중앙선 추가 (점선 만들기)
        const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lineGeometry = new THREE.BoxGeometry(0.2, 0.05, 2); // 폭, 높이, 길이

        for (let i = 0; i < 500; i++) {
            const line = new THREE.Mesh(lineGeometry, lineMaterial);
            // 20 간격으로 도로 중앙(x=0)에 배치
            line.position.set(0, 0.05, i * 5 - 250); 
            scene.add(line);
        }

        // 3. 자동차
        const car = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.5, 2),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        car.position.set(0, 0.25, 0);
        scene.add(car);

        camera.position.set(0, 3, -6);
        camera.lookAt(0, 0, 10);

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function animate() {
            requestAnimationFrame(animate);

            const moveSpeed = 0.2;
            if (keys.w) car.position.z += moveSpeed;
            if (keys.s) car.position.z -= moveSpeed;
            if (keys.a) car.position.x += moveSpeed;
            if (keys.d) car.position.x -= moveSpeed;

            camera.position.x = car.position.x;
            camera.position.z = car.position.z - 6;
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
