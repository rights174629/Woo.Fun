<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>똥피하기 (초고속 & 렌더링 최적화)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; 
            height: 100dvh; 
            background-color: #1e272e;
            color: #d2dae2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #1e272e;
            border-bottom: 1px solid #34495e;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main-go {
            position: absolute;
            left: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #27ae60;
            transition: all 0.1s;
        }

        .btn-main-go:hover { background: #27ae60; }
        .btn-main-go:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #27ae60;
        }

        h1 {
            color: #f1c40f;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            font-weight: 900;
        }

        #game-wrapper {
            flex-grow: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            background-color: #2c3e50;
            box-sizing: border-box;
            overflow: hidden; 
        }

        .game-layout {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-board {
            width: 100%;
            max-width: 800px; /* 💡 PC에서 커진 화면에 맞게 점수판 너비 제한 증가 */
            display: flex;
            justify-content: space-between;
            padding: 0 10px 10px 10px;
            box-sizing: border-box;
            font-size: 20px; 
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #time-display {
            color: #f1c40f;
        }

        #canvas-wrapper {
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #f1f2f6;
            border: 4px solid #576574;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            image-rendering: pixelated; 
            display: block;
            box-sizing: border-box;
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            max-width: 800px; /* 💡 모바일 컨트롤러 너비 제한 증가 */
            gap: 12px;
            padding: 15px 15px 0 15px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            #mobile-controls { display: none !important; }
        }

        .control-btn {
            flex: 1;
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px 0;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #d35400; 
            transition: all 0.1s ease; 
        }

        .control-btn:active {
            transform: translateY(6px); 
            box-shadow: 0 0 0 #d35400; 
            background-color: #e67e22; 
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.88);
            z-index: 10;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .overlay-screen h2 {
            margin: 0 0 15px 0;
            font-size: 34px;
            color: #f1c40f;
            text-shadow: 2px 2px 0px #000;
        }

        #game-over-stats {
            margin-bottom: 25px;
            text-align: center;
            color: #eee;
            font-size: 18px;
            line-height: 1.8;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px 35px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            background-color: #ee5253;
            color: white;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b33939;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b33939;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-main-go" onclick="location.href='index.html'">◀ 메인으로</button>
        <h1>💩 똥피하기</h1>
    </header>

    <div id="game-wrapper">
        <div class="game-layout">
            <div id="score-board">
                <span>최고: <span id="high-score" style="color: #2ecc71;">0</span></span>
                <span id="time-display">⏱ 00:00</span>
                <span>점수: <span id="score" style="color: #ff9f43;">0</span></span>
            </div>
            
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="900" height="1200"></canvas>
                
                <div id="start-screen" class="overlay-screen">
                    <h2>똥피하기</h2>
                    <p style="margin-bottom: 10px; font-size: 18px; line-height: 1.5;">방향키(◀ ▶) 또는 A/D 키로 움직이세요!</p>
                    <p style="margin-bottom: 25px; font-size: 15px; color:#bdc3c7;">우산을 먹으면 6초 동안 무적이 됩니다☂️</p>
                    <button class="btn" onclick="startGame()">게임 시작</button>
                </div>

                <div id="game-over-screen" class="overlay-screen" style="display: none;">
                    <h2 style="color: #ff6b6b;">GAME OVER</h2>
                    <div id="game-over-stats"></div>
                    <button class="btn" onclick="startGame()">다시 도전</button>
                </div>
            </div>

            <div id="mobile-controls">
                <div id="btn-left" class="control-btn">◀ 좌측</div>
                <div id="btn-right" class="control-btn">우측 ▶</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const timeElement = document.getElementById("time-display");
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const gameOverStats = document.getElementById("game-over-stats");

        const playerImg = new Image(); playerImg.src = 'Poo_Ch.png';
        const playerLeftImg = new Image(); playerLeftImg.src = 'Poo_Ch_Left.png';
        const playerRightImg = new Image(); playerRightImg.src = 'Poo_Ch_Right.png';
        
        const playerUmbImg = new Image(); playerUmbImg.src = 'Poo_Ch_Umb.png';
        const playerUmbLeftImg = new Image(); playerUmbLeftImg.src = 'Poo_Ch_Umb_Left.png';
        const playerUmbRightImg = new Image(); playerUmbRightImg.src = 'Poo_Ch_Umb_Right.png';
        
        const poopImg = new Image(); poopImg.src = 'Poo.png';
        const umbImg = new Image(); umbImg.src = 'Umbrella.png';

        function resizeCanvasLayout() {
            const header = document.querySelector("header");
            const scoreBoard = document.getElementById("score-board");
            const mobileControls = document.getElementById("mobile-controls");
            const canvasWrapper = document.getElementById("canvas-wrapper");
            
            const isMobileControlsVisible = window.innerWidth < 768;
            const controlsHeight = isMobileControlsVisible ? mobileControls.offsetHeight : 0;
            
            let availableHeight = window.innerHeight - header.offsetHeight - scoreBoard.offsetHeight - controlsHeight - 40;
            let availableWidth = window.innerWidth - 30;

            let targetWidth = availableHeight * (3 / 4);

            if (targetWidth > availableWidth) {
                targetWidth = availableWidth;
            }

            // 💡 PC에서 화면이 충분히 클 때 캔버스가 더 크게 렌더링되도록 최대 폭을 800으로 늘림
            if (targetWidth > 800) targetWidth = 800;
            
            canvasWrapper.style.width = targetWidth + 'px';
            canvasWrapper.style.height = (targetWidth * (4 / 3)) + 'px';
        }

        window.addEventListener('resize', resizeCanvasLayout);
        resizeCanvasLayout();

        let animationId;
        let isPlaying = false;
        
        let lastTime = 0;
        let globalTime = 0; 
        let spawnCounter = 0;
        
        let scoreFloat = 0; 
        let score = 0;
        let startTime = 0; 
        let formattedTime = "00:00";
        let highScore = localStorage.getItem("pooHighScore") || 0;
        highScoreElement.innerText = highScore;

        let spawnRate = 35; 

        let keys = { left: false, right: false };
        const tileSize = 96; 

        const player = {
            w: tileSize,
            h: tileSize,
            x: canvas.width / 2 - tileSize / 2, 
            y: canvas.height - tileSize - 30, 
            speed: 10, 
            hasUmbrella: false,
            umbrellaEndTime: 0,
            lastMoveTime: 0, 
            
            update(timeScale) {
                if (keys.left || keys.right) {
                    this.lastMoveTime = Date.now();
                }

                if (keys.left) this.x -= this.speed * timeScale;
                if (keys.right) this.x += this.speed * timeScale;

                if (this.x > canvas.width - this.w / 2) {
                    this.x = -this.w / 2;
                } else if (this.x < -this.w / 2) {
                    this.x = canvas.width - this.w / 2;
                }

                this.draw();
            },
            
            draw() {
                let currentImg = playerImg;
                let isWalking = (keys.left || keys.right);
                let isWalkFrame = isWalking && (Math.floor(globalTime / 8) % 2 === 0);

                if (this.hasUmbrella) {
                    let timeLeft = this.umbrellaEndTime - Date.now();
                    let isBlinking = false;
                    
                    if (timeLeft > 0) {
                        if (timeLeft <= 2000) {
                            if (Math.floor(timeLeft / 200) % 2 === 0) {
                                isBlinking = true; 
                            }
                        }
                    } else {
                        this.hasUmbrella = false;
                    }

                    if (this.hasUmbrella && !isBlinking) {
                        if (keys.left && isWalkFrame) currentImg = playerUmbLeftImg;
                        else if (keys.right && isWalkFrame) currentImg = playerUmbRightImg;
                        else currentImg = playerUmbImg;
                    } else {
                        if (keys.left && isWalkFrame) currentImg = playerLeftImg;
                        else if (keys.right && isWalkFrame) currentImg = playerRightImg;
                        else currentImg = playerImg;
                    }
                } else {
                    if (keys.left && isWalkFrame) currentImg = playerLeftImg;
                    else if (keys.right && isWalkFrame) currentImg = playerRightImg;
                    else currentImg = playerImg;
                }

                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);

                if (currentImg.complete && currentImg.naturalHeight !== 0) {
                    ctx.drawImage(currentImg, drawX, drawY, this.w, this.h);
                } else {
                    ctx.fillStyle = this.hasUmbrella ? "#f1c40f" : "#3498db";
                    ctx.fillRect(drawX, drawY, this.w, this.h);
                }

                let idleTime = Date.now() - this.lastMoveTime;
                if (idleTime >= 5000) {
                    let deathTimeLeft = Math.ceil((8000 - idleTime) / 1000);
                    if (deathTimeLeft > 0) {
                        ctx.fillStyle = (Math.floor(globalTime / 5) % 2 === 0) ? "#e74c3c" : "#f1c40f";
                        ctx.font = "bold 26px 'Segoe UI'";
                        ctx.textAlign = "center";
                        ctx.fillText(`이동하세요! (${deathTimeLeft})`, drawX + this.w / 2, drawY - 20);
                    }
                }
            },

            equipUmbrella() {
                this.hasUmbrella = true;
                this.umbrellaEndTime = Date.now() + 6000;
            }
        };

        playerImg.onload = () => {
            if (!isPlaying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                player.draw();
            }
        };

        let poops = [];
        let items = [];
        let meteors = []; 

        class Poop {
            constructor(fixedX = null, fixedSpeed = null) {
                this.w = 72;
                this.h = 72;
                this.x = fixedX !== null ? fixedX : Math.random() * (canvas.width - this.w);
                this.y = -this.h; 
                // 💡 초반 똥 떨어지는 속도를 6.0에서 8.5로 대폭 상향
                this.speed = fixedSpeed !== null ? fixedSpeed : Math.random() * 3 + 8.5 + (score / 800); 
                
                this.isBouncing = false;
                this.vx = 0; 
                this.gravity = 0.8; 
            }
            
            update(timeScale) {
                if (this.isBouncing) {
                    this.speed += this.gravity * timeScale;
                    this.x += this.vx * timeScale;
                }
                this.y += this.speed * timeScale;
                this.draw();
            }
            
            draw() {
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);
                if (poopImg.complete && poopImg.naturalHeight !== 0) {
                    ctx.drawImage(poopImg, drawX, drawY, this.w, this.h);
                } else {
                    ctx.fillStyle = "#8B4513";
                    ctx.fillRect(drawX, drawY, this.w, this.h);
                }
            }
            bounce() {
                this.isBouncing = true;
                this.speed = -18; 
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 5 + 5);
            }
        }

        class MeteorStrike {
            constructor(targetX) {
                this.w = 72;
                this.h = 72;
                this.x = targetX - this.w / 2; 
                
                if (this.x < 0) this.x = 0;
                if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;

                this.y = -this.h; 
                this.state = 'warning'; 
                this.maxTimer = 90; 
                this.timer = this.maxTimer; 
                this.speed = 45; 
                
                this.isBouncing = false;
                this.vx = 0;
                this.gravity = 0.8;
            }

            update(timeScale) {
                if (this.state === 'warning') {
                    this.timer -= timeScale;
                    if (this.timer <= 0) {
                        this.state = 'strike'; 
                    }
                } else if (this.state === 'strike') {
                    if (this.isBouncing) {
                        this.speed += this.gravity * timeScale;
                        this.x += this.vx * timeScale;
                    }
                    this.y += this.speed * timeScale;
                    
                    if (this.y > canvas.height || this.x < -100 || this.x > canvas.width + 100) {
                        this.state = 'done';
                    }
                }
                this.draw();
            }

            draw() {
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);
                
                if (this.state === 'warning') {
                    let t = Math.max(0, this.timer / this.maxTimer);
                    let blinkInterval = Math.max(2, Math.floor(t * 15));
                    
                    if (Math.floor(globalTime) % blinkInterval < Math.max(1, blinkInterval / 2)) {
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                        ctx.fillRect(drawX + this.w/2 - 15, 0, 30, canvas.height);
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                        ctx.fillRect(drawX + this.w/2 - 3, 0, 6, canvas.height);
                    }
                } else if (this.state === 'strike') {
                    if (poopImg.complete && poopImg.naturalHeight !== 0) {
                        ctx.drawImage(poopImg, drawX, drawY, this.w, this.h);
                    } else {
                        ctx.fillStyle = "#c0392b"; 
                        ctx.fillRect(drawX, drawY, this.w, this.h);
                    }
                }
            }

            bounce() {
                this.isBouncing = true;
                this.speed = -25; 
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 8 + 5);
            }
        }

        class Item {
            constructor() {
                this.w = tileSize;
                this.h = tileSize;
                this.x = Math.random() * (canvas.width - this.w);
                this.y = -this.h; 
                this.speed = 6; 
            }
            
            update(timeScale) {
                this.y += this.speed * timeScale;
                this.draw();
            }
            
            draw() {
                let drawX = Math.floor(this.x);
                let drawY = Math.floor(this.y);
                if (umbImg.complete && umbImg.naturalHeight !== 0) {
                    ctx.drawImage(umbImg, drawX, drawY, this.w, this.h);
                } else {
                    ctx.fillStyle = "#2ecc71";
                    ctx.fillRect(drawX, drawY, this.w, this.h);
                }
            }
        }

        function checkCollision(obj1, obj2) {
            const padding = 12; 
            if (obj1.x + padding < obj2.x + obj2.w - padding &&
                obj1.x + obj1.w - padding > obj2.x + padding &&
                obj1.y + padding < obj2.y + obj2.h - padding &&
                obj1.y + obj1.h - padding > obj2.y + padding) {
                return true;
            }
            return false;
        }

        function animate(currentTime) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = currentTime;
            let deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            let timeScale = deltaTime / (1000 / 60);
            if (timeScale > 3) timeScale = 1; 

            globalTime += timeScale;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let now = Date.now();
            let diffSeconds = Math.floor((now - startTime) / 1000);
            let m = String(Math.floor(diffSeconds / 60)).padStart(2, '0');
            let s = String(diffSeconds % 60).padStart(2, '0');
            formattedTime = `${m}:${s}`;
            timeElement.innerText = `⏱ ${formattedTime}`;

            let oldScore = score;
            scoreFloat += timeScale;
            score = Math.floor(scoreFloat);
            
            if (score !== oldScore && score % 10 === 0) {
                scoreElement.innerText = score;
            }

            spawnRate = Math.max(10, 35 - Math.floor(score / 400));
            spawnCounter += timeScale;

            if (spawnCounter >= spawnRate) {
                spawnCounter = 0; 
                
                if (score >= 5000 && Math.random() < 0.1) {
                    let totalSlots = 12; 
                    let offset = 18; 
                    
                    // 💡 구멍 2개를 뚫되, 각각 2칸짜리 넓은 구멍으로 생성
                    let hole1 = Math.floor(Math.random() * (totalSlots - 1));
                    let hole2 = Math.floor(Math.random() * (totalSlots - 1));
                    
                    // 두 구멍이 겹치지 않게 간격 확보
                    while (Math.abs(hole1 - hole2) <= 2) {
                        hole2 = Math.floor(Math.random() * (totalSlots - 1));
                    }
                    
                    // 패턴 시에는 속도 상향 공식 적용
                    let patternSpeed = 8.5 + (score / 800);

                    for (let i = 0; i < totalSlots; i++) {
                        // hole1과 hole1의 오른쪽 칸, hole2와 hole2의 오른쪽 칸을 비워 2칸 간격을 만듦
                        if (i !== hole1 && i !== (hole1 + 1) && i !== hole2 && i !== (hole2 + 1)) {
                            poops.push(new Poop(offset + i * 72, patternSpeed));
                        }
                    }
                } else {
                    if (Math.random() < 0.01) {
                        items.push(new Item());
                    } else {
                        poops.push(new Poop());
                    }
                }

                let meteorChance = 0;
                if (score >= 7000) meteorChance = 0.10;
                else if (score >= 5000) meteorChance = 0.08;
                else if (score >= 3000) meteorChance = 0.06;
                else if (score >= 2000) meteorChance = 0.05;

                if (meteorChance > 0 && meteors.length < 5) {
                    if (Math.random() < meteorChance) {
                        meteors.push(new MeteorStrike(player.x + player.w / 2));
                    }
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.update(timeScale); 
                
                if (checkCollision(item, player)) {
                    player.equipUmbrella();
                    items.splice(i, 1); 
                    scoreFloat += 50; 
                } else if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            for (let i = poops.length - 1; i >= 0; i--) {
                let poop = poops[i];
                poop.update(timeScale); 
                
                if (poop.isBouncing) {
                    if (poop.y > canvas.height || poop.x < -100 || poop.x > canvas.width + 100) {
                        poops.splice(i, 1);
                    }
                    continue; 
                }
                
                if (checkCollision(poop, player)) {
                    if (player.hasUmbrella) {
                        poop.bounce();
                        scoreFloat += 20; 
                    } else {
                        gameOver("poop");
                    }
                } else if (poop.y > canvas.height) {
                    poops.splice(i, 1);
                }
            }

            for (let i = meteors.length - 1; i >= 0; i--) {
                let meteor = meteors[i];
                meteor.update(timeScale); 

                if (meteor.state === 'done') {
                    meteors.splice(i, 1);
                    continue;
                }

                if (meteor.state === 'strike' && !meteor.isBouncing) {
                    if (checkCollision(meteor, player)) {
                        if (player.hasUmbrella) {
                            meteor.bounce();
                            scoreFloat += 50; 
                        } else {
                            gameOver("meteor");
                        }
                    }
                }
            }

            player.update(timeScale); 

            if (Date.now() - player.lastMoveTime >= 8000) {
                gameOver("afk");
                return;
            }

            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        function bindButton(btn, directionKey) {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[directionKey] = true; });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); keys[directionKey] = false; });
            btn.addEventListener('pointercancel', (e) => { e.preventDefault(); keys[directionKey] = false; });
        }

        bindButton(btnLeft, 'left');
        bindButton(btnRight, 'right');

        function startGame() {
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            
            poops = [];
            items = [];
            meteors = []; 
            scoreFloat = 0;
            score = 0;
            scoreElement.innerText = score;
            
            startTime = Date.now();
            formattedTime = "00:00";
            timeElement.innerText = `⏱ 00:00`;

            spawnCounter = 0;
            globalTime = 0;
            spawnRate = 35; 
            
            player.x = canvas.width / 2 - player.w / 2;
            player.hasUmbrella = false;
            player.lastMoveTime = Date.now(); 
            keys.left = false;
            keys.right = false;

            isPlaying = true;
            lastTime = 0; 
            animationId = requestAnimationFrame(animate);
        }

        function gameOver(reason) {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("pooHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            
            let deathMessage = "GAME OVER";
            if (reason === "afk") {
                deathMessage = "잠수 타지 마세요!";
            }

            gameOverStats.innerHTML = `
                <strong style="color:#e74c3c; font-size: 22px; display:block; margin-bottom: 15px;">${deathMessage}</strong>
                생존 시간 : <span style="color:#e74c3c;">${formattedTime}</span><br>
                현재 점수 : <span style="color:#f1c40f;">${score}</span> 점<br>
                최고 점수 : <span style="color:#2ecc71;">${highScore}</span> 점
            `;
            
            gameOverScreen.style.display = "flex";
        }

        window.addEventListener('resize', resizeCanvasLayout);

        player.draw();
    </script>
</body>
</html>
