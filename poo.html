<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>똥피하기 게임</title> 
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB; 
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            text-decoration: none;
            background: #333;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 20;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 10px;
        }

        #score-board {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            font-size: 20px; /* 항목이 3개로 늘어나 폰트 크기 살짝 조정 */
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 3 / 4; 
            background-color: #f1f2f6;
            border: 4px solid #576574;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            image-rendering: pixelated; 
        }

        #mobile-controls {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-top: 15px;
            box-sizing: border-box;
        }

        /* 💡 쫀득한 버튼 애니메이션 적용 */
        .control-btn {
            flex: 1;
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #d35400; /* 어두운 오렌지색 그림자 */
            transition: all 0.1s ease; /* 부드러운 눌림 효과 */
        }

        .control-btn:active {
            transform: translateY(6px); /* 그림자 두께만큼 아래로 이동 */
            box-shadow: 0 0 0 #d35400; /* 눌렸을 때 그림자 사라짐 */
            background-color: #e67e22; /* 눌렸을 때 살짝 더 어두운 색상 */
        }

        .overlay-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            height: 60%;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10;
            border-radius: 15px;
            color: white;
            text-align: center;
        }

        .overlay-screen h2 {
            margin: 0 0 15px 0;
            font-size: 36px;
            color: #f1c40f;
            text-shadow: 2px 2px 0px #000;
        }

        .btn {
            background-color: #ee5253;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b33939;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b33939;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">◀ 메인으로</a>

    <div id="game-container">
        <!-- 💡 상단 스코어 보드에 타이머 추가 -->
        <div id="score-board">
            <span>최고: <span id="high-score">0</span></span>
            <span>시간: <span id="time">0</span>초</span>
            <span>점수: <span id="score">0</span></span>
        </div>
        
        <canvas id="gameCanvas" width="900" height="1200"></canvas>
        
        <div id="mobile-controls">
            <div id="btn-left" class="control-btn">◀ 좌측</div>
            <div id="btn-right" class="control-btn">우측 ▶</div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h2>똥피하기</h2>
            <p style="margin-bottom: 10px; font-size: 18px;">방향키(◀ ▶) 또는 A/D로 움직이세요!</p>
            <!-- 경고 문구 제거됨 -->
            <p style="margin-bottom: 25px; font-size: 14px; color:#bdc3c7;">우산을 먹으면 6초 동안 무적이 됩니다☂️</p>
            <button class="btn" onclick="startGame()">게임 시작</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display: none;">
            <h2 style="color: #ff6b6b;">GAME OVER</h2>
            <p id="final-score" style="font-size: 22px; margin-bottom: 20px; font-weight: bold;">최종 점수: 0</p>
            <button class="btn" onclick="startGame()">다시 도전</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const timeElement = document.getElementById("time"); // 타이머 요소 추가
        
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScoreElement = document.getElementById("final-score");

        // 💡 모든 캐릭터 걷기 모션 에셋 로드
        const playerImg = new Image(); playerImg.src = 'Poo_Ch.png';
        const playerLeftImg = new Image(); playerLeftImg.src = 'Poo_Ch_Left.png';
        const playerRightImg = new Image(); playerRightImg.src = 'Poo_Ch_Right.png';
        
        const playerUmbImg = new Image(); playerUmbImg.src = 'Poo_Ch_Umb.png';
        const playerUmbLeftImg = new Image(); playerUmbLeftImg.src = 'Poo_Ch_Umb_Left.png';
        const playerUmbRightImg = new Image(); playerUmbRightImg.src = 'Poo_Ch_Umb_Right.png';
        
        const poopImg = new Image(); poopImg.src = 'Poo.png';
        const umbImg = new Image(); umbImg.src = 'Umbrella.png';

        let animationId;
        let isPlaying = false;
        
        let score = 0;
        let startTime = 0; // 시작 시간 기록용
        let highScore = localStorage.getItem("pooHighScore") || 0;
        highScoreElement.innerText = highScore;

        let frameCount = 0;
        let spawnRate = 45; 

        let keys = {
            left: false,
            right: false
        };

        const tileSize = 96; 

        const player = {
            w: tileSize,
            h: tileSize,
            x: canvas.width / 2 - tileSize / 2, 
            y: canvas.height - tileSize - 30, 
            speed: 5, 
            hasUmbrella: false,
            umbrellaEndTime: 0,
            
            update() {
                if (keys.left) this.x -= this.speed;
                if (keys.right) this.x += this.speed;

                if (this.x < 0) this.x = 0;
                if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;

                this.draw();
            },
            
            draw() {
                let currentImg = playerImg;

                // 💡 걷기 애니메이션 로직 (8프레임마다 걷기 모션이 교차됨)
                let isWalking = (keys.left || keys.right);
                let isWalkFrame = isWalking && (Math.floor(frameCount / 8) % 2 === 0);

                if (this.hasUmbrella) {
                    let timeLeft = this.umbrellaEndTime - Date.now();
                    let isBlinking = false;
                    
                    if (timeLeft > 0) {
                        if (timeLeft <= 1000) {
                            if (Math.floor(timeLeft / 200) % 2 === 0) {
                                isBlinking = true; // 반짝임 효과 (맨몸으로 잠깐 보임)
                            }
                        }
                    } else {
                        this.hasUmbrella = false;
                    }

                    if (this.hasUmbrella && !isBlinking) {
                        // 우산 쓴 상태의 걷기
                        if (keys.left && isWalkFrame) currentImg = playerUmbLeftImg;
                        else if (keys.right && isWalkFrame) currentImg = playerUmbRightImg;
                        else currentImg = playerUmbImg;
                    } else {
                        // 무적이 끝났거나 반짝일 때의 맨몸 걷기
                        if (keys.left && isWalkFrame) currentImg = playerLeftImg;
                        else if (keys.right && isWalkFrame) currentImg = playerRightImg;
                        else currentImg = playerImg;
                    }
                } else {
                    // 기본 맨몸 걷기
                    if (keys.left && isWalkFrame) currentImg = playerLeftImg;
                    else if (keys.right && isWalkFrame) currentImg = playerRightImg;
                    else currentImg = playerImg;
                }

                // 렌더링
                if (currentImg.complete && currentImg.naturalHeight !== 0) {
                    ctx.drawImage(currentImg, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = this.hasUmbrella ? "#f1c40f" : "#3498db";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
            },

            equipUmbrella() {
                this.hasUmbrella = true;
                this.umbrellaEndTime = Date.now() + 6000;
            }
        };

        playerImg.onload = () => {
            if (!isPlaying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                player.draw();
            }
        };

        let poops = [];
        let items = [];
        let meteors = []; 

        class Poop {
            constructor() {
                this.w = 72;
                this.h = 72;
                this.x = Math.random() * (canvas.width - this.w);
                this.y = -this.h; 
                this.speed = Math.random() * 2 + 3.5 + (score / 1500); 
                
                this.isBouncing = false;
                this.vx = 0; 
                this.gravity = 0.8; 
            }
            update() {
                if (this.isBouncing) {
                    this.speed += this.gravity;
                    this.x += this.vx;
                }
                this.y += this.speed;
                this.draw();
            }
            draw() {
                if (poopImg.complete && poopImg.naturalHeight !== 0) {
                    ctx.drawImage(poopImg, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#8B4513";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
            }
            bounce() {
                this.isBouncing = true;
                this.speed = -18; 
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 5 + 5);
            }
        }

        class MeteorStrike {
            constructor(targetX) {
                this.w = 72;
                this.h = 72;
                this.x = targetX - this.w / 2; 
                
                if (this.x < 0) this.x = 0;
                if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;

                this.y = -this.h; 
                this.state = 'warning'; 
                this.maxTimer = 90;
                this.timer = this.maxTimer; 
                this.speed = 35; 
                
                this.isBouncing = false;
                this.vx = 0;
                this.gravity = 0.8;
            }

            update() {
                if (this.state === 'warning') {
                    this.timer--;
                    if (this.timer <= 0) {
                        this.state = 'strike'; 
                    }
                } else if (this.state === 'strike') {
                    if (this.isBouncing) {
                        this.speed += this.gravity;
                        this.x += this.vx;
                    }
                    this.y += this.speed;
                    
                    if (this.y > canvas.height || this.x < -100 || this.x > canvas.width + 100) {
                        this.state = 'done';
                    }
                }
                this.draw();
            }

            draw() {
                if (this.state === 'warning') {
                    let t = this.timer / this.maxTimer;
                    let blinkInterval = Math.max(2, Math.floor(t * 15));
                    
                    if (frameCount % blinkInterval < Math.max(1, blinkInterval / 2)) {
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                        ctx.fillRect(this.x + this.w/2 - 15, 0, 30, canvas.height);
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                        ctx.fillRect(this.x + this.w/2 - 3, 0, 6, canvas.height);
                    }
                } else if (this.state === 'strike') {
                    if (poopImg.complete && poopImg.naturalHeight !== 0) {
                        ctx.drawImage(poopImg, this.x, this.y, this.w, this.h);
                    } else {
                        ctx.fillStyle = "#c0392b"; 
                        ctx.fillRect(this.x, this.y, this.w, this.h);
                    }
                }
            }

            bounce() {
                this.isBouncing = true;
                this.speed = -25; 
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 8 + 5);
            }
        }

        class Item {
            constructor() {
                this.w = tileSize;
                this.h = tileSize;
                this.x = Math.random() * (canvas.width - this.w);
                this.y = -this.h; 
                this.speed = 4; 
            }
            update() {
                this.y += this.speed;
                this.draw();
            }
            draw() {
                if (umbImg.complete && umbImg.naturalHeight !== 0) {
                    ctx.drawImage(umbImg, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#2ecc71";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
            }
        }

        function checkCollision(obj1, obj2) {
            const padding = 12; 
            if (obj1.x + padding < obj2.x + obj2.w - padding &&
                obj1.x + obj1.w - padding > obj2.x + padding &&
                obj1.y + padding < obj2.y + obj2.h - padding &&
                obj1.y + obj1.h - padding > obj2.y + padding) {
                return true;
            }
            return false;
        }

        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 💡 생존 시간(초) 업데이트
            let elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            timeElement.innerText = elapsedSeconds;

            score++;
            if (score % 10 === 0) {
                scoreElement.innerText = score;
            }

            spawnRate = Math.max(15, 45 - Math.floor(score / 500));

            if (frameCount % spawnRate === 0) {
                
                if (Math.random() < 0.01) {
                    items.push(new Item());
                } else {
                    poops.push(new Poop());
                }

                // 💡 파멸의 일격 확률 5%로 상승
                if (score >= 2000 && meteors.length < 5) {
                    if (Math.random() < 0.05) {
                        meteors.push(new MeteorStrike(player.x + player.w / 2));
                    }
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.update();
                
                if (checkCollision(item, player)) {
                    player.equipUmbrella();
                    items.splice(i, 1); 
                    score += 50; 
                } else if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            for (let i = poops.length - 1; i >= 0; i--) {
                let poop = poops[i];
                poop.update();
                
                if (poop.isBouncing) {
                    if (poop.y > canvas.height || poop.x < -100 || poop.x > canvas.width + 100) {
                        poops.splice(i, 1);
                    }
                    continue; 
                }
                
                if (checkCollision(poop, player)) {
                    if (player.hasUmbrella) {
                        poop.bounce();
                        score += 20; 
                    } else {
                        gameOver();
                    }
                } else if (poop.y > canvas.height) {
                    poops.splice(i, 1);
                }
            }

            for (let i = meteors.length - 1; i >= 0; i--) {
                let meteor = meteors[i];
                meteor.update();

                if (meteor.state === 'done') {
                    meteors.splice(i, 1);
                    continue;
                }

                if (meteor.state === 'strike' && !meteor.isBouncing) {
                    if (checkCollision(meteor, player)) {
                        if (player.hasUmbrella) {
                            meteor.bounce();
                            score += 50; 
                        } else {
                            gameOver();
                        }
                    }
                }
            }

            player.update();
            frameCount++;
            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        function bindButton(btn, directionKey) {
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[directionKey] = true; });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[directionKey] = true; });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[directionKey] = false; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[directionKey] = false; });
        }

        bindButton(btnLeft, 'left');
        bindButton(btnRight, 'right');

        function startGame() {
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            
            poops = [];
            items = [];
            meteors = []; 
            score = 0;
            scoreElement.innerText = score;
            
            // 💡 시작 시 시간 기록 및 초기화
            startTime = Date.now();
            timeElement.innerText = "0";

            frameCount = 0;
            spawnRate = 45;
            
            player.x = canvas.width / 2 - player.w / 2;
            player.hasUmbrella = false;
            keys.left = false;
            keys.right = false;

            isPlaying = true;
            animate();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("pooHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            
            finalScoreElement.innerText = `최종 점수: ${score}`;
            gameOverScreen.style.display = "flex";
        }

        player.draw();
    </script>
</body>
</html>
